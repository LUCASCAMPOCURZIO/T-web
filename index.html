<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Trébol FC</title>

<!-- PWA: instalable en la pantalla de inicio -->
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#0b6e2c" />
<link rel="apple-touch-icon" href="/icons/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />

<link rel="preconnect" href="https://fonts.googleapis.com" />

<link rel="preconnect" href="https://cdn.tailwindcss.com" />
<!-- Solo pedimos los pesos de fuente que realmente usamos (antes pedíamos
     8 variantes, ahora 4) — cada peso de más es un archivo extra que hay
     que descargar antes de que se vea bien la app. -->
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet" />

<script>
  // Guardamos la configuración en una variable propia (no en `tailwind.*`,
  // que todavía no existe) para no bloquear el HTML mientras se descarga
  // Tailwind — se la pasamos recién cuando el script de abajo termina de
  // cargar (ver el atributo onload).
  window.__tailwindConfig = {
    theme: {
      extend: {
        colors: {
          "club-green": "#0b6e2c",
          "club-green-light": "#0f8f3a",
          "club-dark": "#0a1f14",
          "club-red": "#df2b32",
        },
        fontFamily: {
          sans: ["Poppins", "system-ui", "sans-serif"],
          display: ["Oswald", "system-ui", "sans-serif"],
        },
      },
    },
  };
</script>
<script defer src="https://cdn.tailwindcss.com" onload="tailwind.config = window.__tailwindConfig"></script>

<style>
  body {
    background-color: #f5f5f4;
    background-image: radial-gradient(circle at top, rgba(11,110,44,0.07), transparent 55%);
    background-attachment: fixed;
    font-family: 'Poppins', system-ui, sans-serif;
  }
  .font-display { font-family: 'Oswald', system-ui, sans-serif; letter-spacing: .02em; }
  .btn { transition: opacity .15s ease, transform .15s ease; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .btn:active:not(:disabled) { transform: scale(0.97); }
  .card-lift { transition: transform .15s ease, box-shadow .15s ease; }
  .card-lift:hover { transform: translateY(-2px); box-shadow: 0 8px 20px -6px rgba(10,31,20,0.15); }
  .eyebrow { font-family: 'Oswald', system-ui, sans-serif; letter-spacing: .12em; text-transform: uppercase; }
  .rank-badge {
    display: inline-flex; align-items: center; justify-content: center;
    width: 1.5rem; height: 1.5rem; border-radius: 9999px;
    font-size: .7rem; font-weight: 700; flex-shrink: 0;
  }
  /* Cinta de capitán: una bandita (no un círculo) con una "C", como la que
     se usa en la manga de la camiseta — en vez del emoji de medalla. */
  .captain-armband {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 1.2rem; height: 1rem; padding: 0 3px; border-radius: 2px;
    background: #1a1a1a; color: #fff; font-size: .62rem; font-weight: 800;
    line-height: 1; box-shadow: inset 0 0 0 1.5px #d4af37; flex-shrink: 0;
    vertical-align: middle;
  }
  /* Insignia de DT: mismo tamaño/forma que la del capitán, pero en otro
     color para distinguirlos a simple vista (azul club en vez de negro). */
  .dt-badge {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 1.2rem; height: 1rem; padding: 0 3px; border-radius: 2px;
    background: #1d4ed8; color: #fff; font-size: .58rem; font-weight: 800;
    line-height: 1; flex-shrink: 0; vertical-align: middle;
  }

  /* Pantalla de carga inicial, en CSS puro (nada de Tailwind) — así se ve
     apenas se abre la app, sin esperar a que bajen ni Tailwind ni las
     tipografías ni Firebase. En cuanto la app arranca de verdad, este
     bloque se reemplaza solo (ver el primer renderNavbar()/route()). */
  #boot-splash {
    min-height: 70vh; display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 14px; color: #9ca3af; font-family: system-ui, sans-serif;
  }
  #boot-splash img { width: 56px; height: 56px; border-radius: 9999px; animation: boot-pulse 1.4s ease-in-out infinite; }
  @keyframes boot-pulse { 0%, 100% { opacity: .45; } 50% { opacity: 1; } }

  /* Fondo con fotos del equipo, en blanco y negro y bien atenuado para no
     competir con el contenido — arranca recién unos segundos después de
     que la app ya está andando (ver startBgSlideshow), para no sumarle
     nada al tiempo de carga inicial. */
  #bg-slideshow { position: fixed; inset: 0; z-index: -2; overflow: hidden; background: #e7e7e5; }
  #bg-slideshow img {
    position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
    opacity: 0; transition: opacity 2.5s ease;
  }
  #bg-slideshow img.active { opacity: 1; }
  #bg-scrim { position: fixed; inset: 0; z-index: -1; background: rgba(245,245,244,.85); }
  @media (prefers-reduced-motion: reduce) {
    #bg-slideshow img { transition: none; }
  }
</style>
</head>
<body class="min-h-screen">
  <div id="bg-slideshow" aria-hidden="true"></div>
  <div id="bg-scrim" aria-hidden="true"></div>
  <div id="navbar"></div>
  <main id="app" class="mx-auto max-w-2xl space-y-6 px-4 py-6">
    <div id="boot-splash"><img src="/icons/icon-192.png" alt="" /><p>Cargando…</p></div>
  </main>
  <div id="toast" class="pointer-events-none fixed inset-x-0 bottom-4 z-50 flex flex-col items-center gap-2 px-4"></div>

<script type="module" async>
/* =========================================================================
   Trébol FC — app de un solo archivo (HTML + CSS + JS), sin servidor
   propio: los datos viven en Firebase Firestore y el hosting es estático
   (Vercel/GitHub Pages/lo que sea). Para actualizar la app en el futuro,
   alcanza con reemplazar este archivo.

   No hay contraseña por jugador (se elige el nombre de una lista, como
   antes). El acceso de administrador es un PIN compartido, verificado por
   las reglas de seguridad de Firestore (ver firestore.rules) — el PIN
   nunca se guarda ni se expone en este archivo.
   ========================================================================= */

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import {
  getFirestore, collection, collectionGroup, doc, getDoc, getDocs, setDoc,
  addDoc, updateDoc, deleteDoc, onSnapshot, query, where, orderBy,
  serverTimestamp, writeBatch,
} from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
import {
  getAuth, signInAnonymously, onAuthStateChanged,
} from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

// -------------------------------------------------------------------------
// CONFIGURACIÓN DE FIREBASE
// Estos valores NO son secretos (están pensados para ir en el código del
// cliente); la seguridad real la dan las reglas de Firestore, no que esto
// esté "escondido". Se completan una sola vez, al crear el proyecto de
// Firebase — ver README.md.
// -------------------------------------------------------------------------
const firebaseConfig = {
  apiKey: "AIzaSyB6C0ZgLExepMTC4583TSPpzmemgRUB7qc",
  authDomain: "trebol-fc.firebaseapp.com",
  projectId: "trebol-fc",
  storageBucket: "trebol-fc.firebasestorage.app",
  messagingSenderId: "942872703021",
  appId: "1:942872703021:web:6cde90435253e7873c48a4",
};

const firebaseApp = initializeApp(firebaseConfig);
const db = getFirestore(firebaseApp);
const auth = getAuth(firebaseApp);

// Nombre del torneo actual, solo para mostrarlo en la pantalla de
// Estadísticas junto a la tabla de posiciones. Cuando cambie el torneo,
// actualizá este texto Y el número de torneo en api/standings.js (son dos
// lugares separados porque uno vive en el navegador y el otro en el
// servidor) — ver README.md.
const TORNEO_NOMBRE = "Copa de Oro B4";

// Un partido "pertenece" al torneo que estaba vigente (TORNEO_NOMBRE) el día
// que se cargó, guardado como campo propio (match.torneoNombre) para que no
// cambie de torneo retroactivamente si después arranca uno nuevo. Los
// partidos viejos, de antes de que existiera este campo, no lo tienen
// guardado — se los trata como si fueran del torneo actual (con
// "|| TORNEO_NOMBRE"), total en la práctica todos se cargaron durante este
// mismo torneo que sigue en curso. Así, las estadísticas de "🏆 Torneo
// actual" se reinician solas apenas cambia esta constante para el próximo
// torneo (los partidos viejos quedan con el nombre viejo, dejan de
// contar acá, pero siguen sumando siempre en "📈 Históricas").
function isCurrentTorneo(m) {
  return (m.torneoNombre || TORNEO_NOMBRE) === TORNEO_NOMBRE;
}

// -------------------------------------------------------------------------
// Utilidades
// -------------------------------------------------------------------------
const PLAYER_KEY = "trebol_player_id";

function escapeHtml(str) {
  return String(str ?? "").replace(/[&<>"']/g, (c) => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
  }[c]));
}

function displayName(p) {
  if (!p) return "?";
  return escapeHtml(p.nickname || p.name || "?");
}

// Igual que displayName, pero sin escapar HTML: para armar textos planos
// (por ejemplo, el mensaje de "Compartir por WhatsApp"), no para insertar
// en el DOM.
function rawDisplayName(p) {
  if (!p) return "?";
  return p.nickname || p.name || "?";
}

// Prefijo con la cinta de capitán (una "C"), para mostrar junto al nombre
// en pantallas donde tiene sentido (plantel, quién sos, confirmados).
function captainBadge() {
  return `<span class="captain-armband" title="Capitán">C</span>`;
}
// Insignia de DT (cuerpo técnico) — mismo lugar que la del capitán, pero en
// azul para distinguirla a simple vista. A diferencia del capitán, puede
// haber más de un DT a la vez (por ejemplo, DT + ayudante de campo).
function dtBadge() {
  return `<span class="dt-badge" title="Director Técnico">DT</span>`;
}
function displayNameWithCaptain(p) {
  if (!p) return "?";
  const badges = [];
  if (p.isCaptain) badges.push(captainBadge());
  if (p.isDT) badges.push(dtBadge());
  return (badges.length ? badges.join(" ") + " " : "") + displayName(p);
}

function pad(n) { return String(n).padStart(2, "0"); }

// Circulito de color para el puesto en un ranking (goleadores, figuras,
// tabla de posiciones, etc.) — oro/plata/bronce para el podio, verde
// suave para el resto.
function rankBadge(n) {
  const styles = {
    1: "bg-yellow-400 text-yellow-900",
    2: "bg-gray-300 text-gray-700",
    3: "bg-amber-600 text-amber-50",
  };
  const cls = styles[n] || "bg-club-green/10 text-club-green";
  return `<span class="rank-badge ${cls}">${n}</span>`;
}

// Argentina no tiene horario de verano desde 2009: siempre UTC-3.
function toBAInputValue(jsDate) {
  const ba = new Date(jsDate.getTime() - 3 * 60 * 60 * 1000);
  return `${ba.getUTCFullYear()}-${pad(ba.getUTCMonth() + 1)}-${pad(ba.getUTCDate())}T${pad(ba.getUTCHours())}:${pad(ba.getUTCMinutes())}`;
}

function fromBAInputValue(value) {
  const [datePart, timePart] = value.split("T");
  const [y, m, d] = datePart.split("-").map(Number);
  const [hh, mm] = timePart.split(":").map(Number);
  return new Date(Date.UTC(y, m - 1, d, hh + 3, mm, 0));
}

const fmtShort = new Intl.DateTimeFormat("es-AR", {
  weekday: "short", day: "numeric", month: "short",
  hour: "2-digit", minute: "2-digit", timeZone: "America/Argentina/Buenos_Aires",
});
const fmtLong = new Intl.DateTimeFormat("es-AR", {
  weekday: "long", day: "numeric", month: "long", timeZone: "America/Argentina/Buenos_Aires",
});

function tsToDate(ts) {
  return ts && typeof ts.toDate === "function" ? ts.toDate() : new Date(ts);
}

function showToast(message, kind) {
  const el = document.createElement("div");
  el.className =
    "pointer-events-auto rounded-lg px-4 py-2 text-sm font-medium text-white shadow-lg " +
    (kind === "error" ? "bg-red-600" : "bg-club-green");
  el.textContent = message;
  document.getElementById("toast").appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

async function runAction(fn) {
  try {
    await fn();
  } catch (err) {
    console.error(err);
    const msg = err && err.code === "permission-denied"
      ? "No tenés permiso para hacer esto (¿se cerró tu sesión de admin?)."
      : (err && err.message) || "Ocurrió un error.";
    showToast(msg, "error");
  }
}

// -------------------------------------------------------------------------
// Estado global en memoria, alimentado por listeners en vivo de Firestore.
// -------------------------------------------------------------------------
const state = {
  ready: false,
  uid: null,
  isAdmin: false,
  playerId: localStorage.getItem(PLAYER_KEY) || null,
  players: [],
  playersById: {},
  matches: [],
  nextMatch: null,
  recentMatches: [],
  votesByMatch: {}, // matchId -> array of vote docs {id(=playerId), response, ...}
  detailMatchId: null,
  detailGoals: [],
  detailCards: [],
  detailAttendance: [], // asistencia real cargada por un admin para el partido que se está viendo
  detailMotmVotes: [], // votos de figura del partido del partido que se está viendo (admin)
  detailComments: [], // comentarios del partido que se está viendo (admin, para poder moderar)
  detailPayments: [], // cuánto pagó cada uno en el partido que se está viendo (solo admin)
  detailGuests: [], // invitados sueltos de ESTE partido puntual (no van al plantel), solo admin
  lastPlayedAttendance: [], // asistencia del último partido jugado (para que un jugador pueda votar)
  lastPlayedMotmVotes: [], // mis votos de figura del último partido jugado (vista jugador)
  nextMatchComments: [], // muro de comentarios del próximo partido (vista jugador)
  lastPlayedComments: [], // muro de comentarios del último partido jugado (vista jugador)
  stats: null, // {goleadores, asistencias, tarjetas, porJugador} de TODOS los partidos (históricas)
  statsTorneo: null, // misma forma que "stats", pero solo de los partidos del torneo actual
  statsLoading: false,
  statsError: null,
  statsTab: "torneo", // "torneo" | "historicas" — qué mitad de Estadísticas se ve
  standings: null, // {rows, fetchedAt} — tabla de posiciones de la liga
  standingsRefreshing: false,
};

function currentPlayer() {
  return state.playersById[state.playerId] || null;
}

// -------------------------------------------------------------------------
// Router muy simple basado en location.hash
// -------------------------------------------------------------------------
function navigate(hash) {
  if (location.hash === hash) { route(); } else { location.hash = hash; }
}
window.navigate = navigate;

window.addEventListener("hashchange", route);

function route() {
  const hash = location.hash || "#/";
  render(hash);
}

// -------------------------------------------------------------------------
// Listeners en vivo (se arrancan una vez que hay sesión anónima)
// -------------------------------------------------------------------------
function startListeners() {
  onSnapshot(doc(db, "config", "standings"), (snap) => {
    state.standings = snap.exists() ? snap.data() : null;
    route();
  }, (err) => console.error("standings listener:", err));

  onSnapshot(query(collection(db, "players"), orderBy("name")), (snap) => {
    state.players = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
    state.playersById = Object.fromEntries(state.players.map((p) => [p.id, p]));
    route();
  }, (err) => console.error("players listener:", err));

  // Traemos todos los partidos ordenados por fecha (son pocos por año) y
  // derivamos "próximo" / "recientes" en el cliente: así evitamos tener que
  // crear índices compuestos en Firestore.
  onSnapshot(query(collection(db, "matches"), orderBy("date", "desc")), (snap) => {
    state.matches = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
    const programados = state.matches
      .filter((m) => m.status === "PROGRAMADO")
      .sort((a, b) => tsToDate(a.date) - tsToDate(b.date));
    state.nextMatch = programados[0] || null;
    state.recentMatches = state.matches
      .filter((m) => m.status === "JUGADO" || m.status === "CANCELADO")
      .slice(0, 5);
    const lastPlayed = state.matches.find((m) => m.status === "JUGADO") || null;

    // (Re)conectar los listeners de votos del próximo partido, y de
    // asistencia/votos de figura del último partido jugado (para que un
    // jugador pueda votar la figura desde la pantalla principal).
    connectVotesListener(state.nextMatch ? state.nextMatch.id : null);
    connectLastPlayedListeners(lastPlayed ? lastPlayed.id : null);
    connectNextMatchCommentsListener(state.nextMatch ? state.nextMatch.id : null);
    connectLastPlayedCommentsListener(lastPlayed ? lastPlayed.id : null);
    route();
  }, (err) => console.error("matches listener:", err));
}

let unsubVotes = null;
let votesListenerMatchId = null;
function connectVotesListener(matchId) {
  if (matchId === votesListenerMatchId) return;
  votesListenerMatchId = matchId;
  if (unsubVotes) { unsubVotes(); unsubVotes = null; }
  if (!matchId) return;
  unsubVotes = onSnapshot(collection(db, "matches", matchId, "votes"), (snap) => {
    state.votesByMatch[matchId] = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
    route();
  }, (err) => console.error("votes listener:", err));
}

let unsubLastPlayed = { attendance: null, motmVotes: null };
let lastPlayedListenerMatchId = null;
function connectLastPlayedListeners(matchId) {
  if (matchId === lastPlayedListenerMatchId) return;
  lastPlayedListenerMatchId = matchId;
  if (unsubLastPlayed.attendance) unsubLastPlayed.attendance();
  if (unsubLastPlayed.motmVotes) unsubLastPlayed.motmVotes();
  state.lastPlayedAttendance = [];
  state.lastPlayedMotmVotes = [];
  if (!matchId) return;
  unsubLastPlayed.attendance = onSnapshot(collection(db, "matches", matchId, "attendance"), (snap) => {
    state.lastPlayedAttendance = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
    route();
  }, (err) => console.error("lastPlayed attendance listener:", err));
  unsubLastPlayed.motmVotes = onSnapshot(collection(db, "matches", matchId, "motmVotes"), (snap) => {
    state.lastPlayedMotmVotes = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
    route();
  }, (err) => console.error("lastPlayed motmVotes listener:", err));
}

// Fábrica de listeners de comentarios: se usa 3 veces (próximo partido,
// último partido jugado, y el partido que esté mirando un admin en el
// detalle), cada una guardando en un campo de state distinto, para poder
// tener hasta 3 muros de comentarios "en vivo" a la vez sin repetir código.
function makeCommentsListener(stateKey) {
  let unsub = null;
  let listenerMatchId = null;
  return function connect(matchId) {
    if (matchId === listenerMatchId) return;
    listenerMatchId = matchId;
    if (unsub) { unsub(); unsub = null; }
    state[stateKey] = [];
    if (!matchId) { route(); return; }
    unsub = onSnapshot(
      query(collection(db, "matches", matchId, "comments"), orderBy("createdAt", "asc")),
      (snap) => {
        state[stateKey] = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
        route();
      },
      (err) => console.error("comments listener:", err)
    );
  };
}
const connectNextMatchCommentsListener = makeCommentsListener("nextMatchComments");
const connectLastPlayedCommentsListener = makeCommentsListener("lastPlayedComments");
const connectDetailCommentsListener = makeCommentsListener("detailComments");

let unsubDetail = { goals: null, cards: null, attendance: null, motmVotes: null, payments: null, guests: null };
function connectDetailListeners(matchId) {
  if (state.detailMatchId === matchId) return;
  state.detailMatchId = matchId;
  if (unsubDetail.goals) unsubDetail.goals();
  if (unsubDetail.cards) unsubDetail.cards();
  if (unsubDetail.attendance) unsubDetail.attendance();
  if (unsubDetail.motmVotes) unsubDetail.motmVotes();
  if (unsubDetail.payments) unsubDetail.payments();
  if (unsubDetail.guests) unsubDetail.guests();
  connectDetailCommentsListener(matchId);
  if (!matchId) return;
  unsubDetail.goals = onSnapshot(collection(db, "matches", matchId, "goals"), (snap) => {
    state.detailGoals = snap.docs.map((d) => ({ id: d.id, ...d.data() }))
      .sort((a, b) => (a.createdAt?.seconds ?? 0) - (b.createdAt?.seconds ?? 0));
    route();
  }, (err) => console.error("goals listener:", err));
  unsubDetail.cards = onSnapshot(collection(db, "matches", matchId, "cards"), (snap) => {
    state.detailCards = snap.docs.map((d) => ({ id: d.id, ...d.data() }))
      .sort((a, b) => (a.createdAt?.seconds ?? 0) - (b.createdAt?.seconds ?? 0));
    route();
  }, (err) => console.error("cards listener:", err));
  unsubDetail.attendance = onSnapshot(collection(db, "matches", matchId, "attendance"), (snap) => {
    state.detailAttendance = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
    route();
  }, (err) => console.error("attendance listener:", err));
  unsubDetail.motmVotes = onSnapshot(collection(db, "matches", matchId, "motmVotes"), (snap) => {
    state.detailMotmVotes = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
    route();
  }, (err) => console.error("motmVotes listener:", err));
  // Solo un admin puede leer esta subcolección (ver firestore.rules) — como
  // esta pantalla de detalle es admin-only, siempre va a poder.
  unsubDetail.payments = onSnapshot(collection(db, "matches", matchId, "payments"), (snap) => {
    state.detailPayments = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
    syncTotalRecaudado(matchId);
    route();
  }, (err) => console.error("payments listener:", err));
  // Invitados sueltos de este partido puntual (chicos que vienen a dar una
  // mano un domingo): viven en su propia subcolección, separada de
  // "players", para no tocar el plantel ni las estadísticas históricas.
  // Solo un admin puede leerla (ver firestore.rules).
  unsubDetail.guests = onSnapshot(collection(db, "matches", matchId, "guests"), (snap) => {
    state.detailGuests = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
    syncTotalRecaudado(matchId);
    route();
  }, (err) => console.error("guests listener:", err));
}

// Suma lo que pagó cada jugador presente (state.detailPayments) más lo que
// pagaron los invitados sueltos (state.detailGuests) — ambos listeners de
// más arriba mantienen esas dos listas siempre al día con Firestore.
function sumPaymentsAndGuests() {
  // El total tiene que ser SIEMPRE exactamente lo que se ve sumado en las
  // filas de "💰 Plata del partido" — ni un peso de más ni de menos. Por
  // eso se filtra a los pagos de jugadores que siguen figurando como
  // presentes ahora mismo (presentPlayerIdsForMatch: activos, no-DT, y
  // marcados presentes) — si alguien queda destildado de "✅ Asistencia"
  // después de haber tenido un pago cargado (por corregir un error, por
  // ejemplo), o si se lo elimina definitivamente del plantel, su pago viejo
  // deja de sumar en vez de quedar contando para siempre sin que se vea en
  // ningún lado de dónde sale esa plata.
  const presentIds = new Set(presentPlayerIdsForMatch(state.detailMatchId));
  return state.detailPayments.reduce((sum, p) => sum + (presentIds.has(p.id) ? (p.amount || 0) : 0), 0)
    + state.detailGuests.reduce((sum, g) => sum + (g.amount || 0), 0);
}

// Recalcula matches.totalRecaudado a partir de esos mismos datos frescos, y
// lo guarda. Se llama SIEMPRE desde los listeners de payments/guests
// (arriba), nunca desde una acción puntual de guardar un pago — así el
// total sale siempre de lo que Firestore acaba de confirmar como estado
// real de la colección, no de una cuenta manual "total anterior - viejo +
// nuevo" hecha con una copia local que podía estar desactualizada. Ese
// cálculo manual era la causa de que el total quedara mal si se cargaban
// varios pagos muy rápido seguido, uno atrás de otro, sin esperar a que
// cada uno "hiciera ida y vuelta" con el servidor.
function syncTotalRecaudado(matchId) {
  const total = sumPaymentsAndGuests();
  const match = state.matches.find((m) => m.id === matchId);
  if (match && match.totalRecaudado === total) return; // ya está al día
  updateDoc(doc(db, "matches", matchId), { totalRecaudado: total })
    .catch((err) => console.error("syncTotalRecaudado:", err));
}

async function loadStats() {
  state.statsLoading = true;
  state.statsError = null;
  route();
  // Se piden por separado (no con Promise.all) para poder decir
  // puntualmente cuál falló, en vez de un error genérico.
  const queries = [
    ["goals", collectionGroup(db, "goals")],
    ["cards", collectionGroup(db, "cards")],
    ["attendance", collectionGroup(db, "attendance")],
  ];
  const results = await Promise.allSettled(queries.map(([, q]) => getDocs(q)));
  const failed = results
    .map((r, i) => (r.status === "rejected" ? { name: queries[i][0], err: r.reason } : null))
    .filter(Boolean);
  if (failed.length > 0) {
    failed.forEach((f) => console.error(`loadStats (${f.name}):`, f.err));
    state.statsError = failed.map((f) => `"${f.name}": ${(f.err && f.err.message) || "error desconocido"}`).join(" / ");
    state.statsLoading = false;
    route();
    return;
  }
  const [goalsSnap, cardsSnap, attendanceSnap] = results.map((r) => r.value);

  // Cada doc de estas 3 colecciones vive bajo matches/{matchId}/..., así
  // que alcanza con mirar el path para saber a qué partido pertenece —
  // hace falta para poder armar la versión "solo este torneo" de abajo.
  function matchIdOf(d) { return d.ref.path.split("/")[1]; }

  // Arma las estadísticas por jugador para un subconjunto de partidos
  // (matchFilter recibe el objeto match y devuelve true/false). Se llama
  // dos veces: una sin filtro (📈 Históricas, de siempre — se van
  // acumulando partido a partido) y otra solo con los partidos del torneo
  // actual (🏆 Torneo actual — se reinicia sola en cuanto arranca un
  // torneo nuevo, ver isCurrentTorneo).
  function buildStats(matchFilter) {
    const includedMatchIds = new Set(state.matches.filter(matchFilter).map((m) => m.id));
    const goleadoresMap = new Map();
    const asistenciasMap = new Map();
    goalsSnap.forEach((d) => {
      if (!includedMatchIds.has(matchIdOf(d))) return;
      const g = d.data();
      const scorer = goleadoresMap.get(g.scorerId) || { id: g.scorerId, count: 0 };
      scorer.count += 1;
      goleadoresMap.set(g.scorerId, scorer);
      if (g.assistId) {
        const assist = asistenciasMap.get(g.assistId) || { id: g.assistId, count: 0 };
        assist.count += 1;
        asistenciasMap.set(g.assistId, assist);
      }
    });
    const tarjetasMap = new Map();
    cardsSnap.forEach((d) => {
      if (!includedMatchIds.has(matchIdOf(d))) return;
      const c = d.data();
      const entry = tarjetasMap.get(c.playerId) || { id: c.playerId, amarillas: 0, rojas: 0 };
      if (c.type === "AMARILLA") entry.amarillas += 1; else entry.rojas += 1;
      tarjetasMap.set(c.playerId, entry);
    });
    // "Presencias": SOLO la asistencia real que carga un admin a mano (la
    // lista de "✅ Asistencia" de cada partido) — no el voto "Voy" de antes
    // de jugar, que no es confiable (alguien confirma y no va, o marca que
    // no va y termina yendo). Si un partido no tiene asistencia cargada,
    // simplemente no suma presencias para nadie en ese partido.
    const presenciasMap = new Map();
    attendanceSnap.forEach((d) => {
      if (!includedMatchIds.has(matchIdOf(d))) return;
      if (d.data().present) presenciasMap.set(d.id, (presenciasMap.get(d.id) || 0) + 1);
    });
    // Figura del partido y bolso de lavado viven como campos en el propio
    // documento del partido, ya en memoria por el listener en vivo — no
    // hace falta pedirle nada más a Firestore para estos dos datos.
    const figurasMap = new Map(motmRanking(matchFilter).map((f) => [f.id, f.count]));
    const bolsosMap = new Map(bolsoRanking(matchFilter).map((b) => [b.id, b.count]));
    // % de asistencia: sobre el total de partidos (de este subconjunto) que
    // jugó el equipo, para que sea comparable entre jugadores
    // independientemente de cuándo se sumaron al plantel.
    const totalJugados = state.matches.filter((m) => m.status === "JUGADO" && matchFilter(m)).length;
    // Tabla completa: una fila por CADA jugador (incluso sin ningún dato
    // todavía), para poder comparar a todo el plantel de un vistazo. El
    // cuerpo técnico (isDT) queda afuera: aunque puedan entrar y marcar
    // asistencia como uno más, Lucas no los quiere mezclados en las
    // estadísticas de jugadores.
    const porJugador = state.players.filter((p) => !p.isDT).map((p) => {
      const presencias = presenciasMap.get(p.id) || 0;
      return {
        id: p.id,
        presencias,
        totalJugados,
        presenciaPct: totalJugados > 0 ? Math.round((presencias / totalJugados) * 100) : null,
        figuras: figurasMap.get(p.id) || 0,
        bolsos: bolsosMap.get(p.id) || 0,
        goles: goleadoresMap.get(p.id)?.count || 0,
        asistencias: asistenciasMap.get(p.id)?.count || 0,
        amarillas: tarjetasMap.get(p.id)?.amarillas || 0,
        rojas: tarjetasMap.get(p.id)?.rojas || 0,
      };
    }).sort((a, b) => displayName(state.playersById[a.id]).localeCompare(displayName(state.playersById[b.id]), "es"));
    return {
      goleadores: [...goleadoresMap.values()].sort((a, b) => b.count - a.count),
      asistencias: [...asistenciasMap.values()].sort((a, b) => b.count - a.count),
      tarjetas: [...tarjetasMap.values()].sort((a, b) => (b.amarillas + b.rojas) - (a.amarillas + a.rojas)),
      porJugador,
    };
  }

  state.stats = buildStats(() => true);
  state.statsTorneo = buildStats(isCurrentTorneo);
  state.statsLoading = false;
  route();
}

window.retryLoadStats = function () {
  state.statsError = null;
  loadStats();
};

// Arranque: autenticación anónima (necesaria para poder votar y, si
// corresponde, para las reglas de admin) y chequeo de sesión de admin.

onAuthStateChanged(auth, async (user) => {
  if (!user) { await signInAnonymously(auth).catch((e) => console.error(e)); return; }
  state.uid = user.uid;
  try {
    const sessionSnap = await getDoc(doc(db, "adminSessions", user.uid));
    state.isAdmin = sessionSnap.exists();
  } catch (e) {
    state.isAdmin = false;
  }
  state.ready = true;
  startListeners();
  route();
});

// Arma un texto prolijo con la lista de confirmados del próximo partido y
// abre WhatsApp (la app si está instalada, o web.whatsapp.com si no) con
// ese texto ya cargado, listo para elegir el grupo y mandarlo. No lo
// mandamos nosotros: el usuario elige el chat y aprieta enviar él mismo,
// como cualquier botón de "compartir".
window.shareConfirmados = function () {
  const match = state.nextMatch;
  if (!match) return;
  const votes = state.votesByMatch[match.id] || [];
  const confirmados = votes
    .filter((v) => v.response === "VOY")
    .map((v) => rawDisplayName(state.playersById[v.id]))
    .filter((n) => n && n !== "?");

  let text = `⚽ Trébol FC vs ${match.opponent}\n${fmtLong.format(tsToDate(match.date))}`;
  if (match.sede) text += ` · ${match.sede}`;
  text += "\n\n";
  if (confirmados.length === 0) {
    text += "Todavía no confirmó nadie. ¡Metan \"Voy\" en la app! 👇";
  } else {
    text += `✅ Confirmados (${confirmados.length}):\n` + confirmados.map((n, i) => `${i + 1}. ${n}`).join("\n");
  }
  text += `\n\n${location.origin}`;

  window.open("https://wa.me/?text=" + encodeURIComponent(text), "_blank");
};

async function deleteSubcollection(matchId, name) {
  const snap = await getDocs(collection(db, "matches", matchId, name));
  const batch = writeBatch(db);
  snap.forEach((d) => batch.delete(d.ref));
  await batch.commit();
}

// Firestore NO borra solo las subcolecciones de un documento al borrarlo
// (quedarían "huérfanas" pero se seguirían contando en Estadísticas, que
// junta datos de todos los partidos) — por eso hay que borrar acá, a mano,
// las 6 subcolecciones que puede llegar a tener un partido.
window.deleteMatch = function (matchId) {
  if (!confirm("¿Seguro que querés borrar este partido? Se borran también sus goles, tarjetas, asistencia, votos, comentarios, pagos e invitados. No se puede deshacer.")) return;
  runAction(async () => {
    await Promise.all([
      deleteSubcollection(matchId, "votes"),
      deleteSubcollection(matchId, "goals"),
      deleteSubcollection(matchId, "cards"),
      deleteSubcollection(matchId, "attendance"),
      deleteSubcollection(matchId, "motmVotes"),
      deleteSubcollection(matchId, "comments"),
      deleteSubcollection(matchId, "payments"),
      deleteSubcollection(matchId, "guests"),
    ]);
    await deleteDoc(doc(db, "matches", matchId));
    showToast("Partido borrado.");
  });
};

// Herramienta de limpieza para datos que quedaron "sueltos" de partidos que
// se borraron ANTES de que existiera el borrado-de-subcolecciones de arriba
// (o por cualquier otro motivo quedaron huérfanos). Sin esto, esos datos
// viejos se siguen contando en Estadísticas para siempre porque las
// collection group queries no distinguen si el partido dueño todavía existe.
window.cleanOrphanedMatchData = function () {
  if (!confirm('Esto busca asistencia, votos, goles, tarjetas, comentarios, pagos e invitados que hayan quedado de partidos ya borrados (no de los partidos actuales) y los elimina. ¿Continuar?')) return;
  runAction(async () => {
    const matchesSnap = await getDocs(collection(db, "matches"));
    const validIds = new Set(matchesSnap.docs.map((d) => d.id));
    const subcollections = ["votes", "goals", "cards", "attendance", "motmVotes", "comments", "payments", "guests"];
    const orphanRefs = [];
    for (const name of subcollections) {
      const snap = await getDocs(collectionGroup(db, name));
      snap.forEach((d) => {
        const matchId = d.ref.path.split("/")[1];
        if (!validIds.has(matchId)) orphanRefs.push(d.ref);
      });
    }
    if (orphanRefs.length === 0) {
      showToast("No se encontró nada suelto: todo lo que hay en Estadísticas es de partidos actuales.");
      return;
    }
    // Firestore no permite más de 500 operaciones por batch.
    for (let i = 0; i < orphanRefs.length; i += 400) {
      const batch = writeBatch(db);
      orphanRefs.slice(i, i + 400).forEach((ref) => batch.delete(ref));
      await batch.commit();
    }
    showToast(`Listo: se borraron ${orphanRefs.length} dato(s) sueltos de partidos ya eliminados.`);
    state.stats = null;
    loadStats();
  });
};

// (no hace falta una colección aparte), así que ya viaja con el resto de
// los datos de "matches" que están siempre en memoria. Se puede elegir a
// mano (esto) o por votación de los jugadores (ver más abajo); elegirla a
// mano siempre cierra/descarta cualquier votación que estuviera abierta.
window.setMotm = function (matchId, playerId) {

    await updateDoc(doc(db, "matches", matchId), { motmPlayerId: playerId || null, motmVotingOpen: false });
    showToast("Figura del partido guardada.");

// Votación de figura del partido entre los jugadores que estuvieron en la
// cancha. Al abrirla, "congelamos" la asistencia actual (la que se ve en
// pantalla, sea explícita o el aproximado por "Voy") como documentos
// explícitos: así la lista de quién puede votar no cambia sola después.
window.openMotmVoting = function (matchId) {
  runAction(async () => {
    const attendanceIds = new Set(state.detailAttendance.map((a) => a.id));
    const voyIds = new Set((state.votesByMatch[matchId] || []).filter((v) => v.response === "VOY").map((v) => v.id));
    const activePlayers = state.players.filter((p) => p.active !== false);
    const batch = writeBatch(db);
    let touched = false;
    for (const p of activePlayers) {
      if (!attendanceIds.has(p.id)) {
        batch.set(doc(db, "matches", matchId, "attendance", p.id), { present: voyIds.has(p.id) });
        touched = true;
      }
    }
    if (touched) await batch.commit();
    await updateDoc(doc(db, "matches", matchId), { motmVotingOpen: true, motmPlayerId: null });
    showToast("Votación de figura del partido abierta.");
  });
};

// Cierra la votación, cuenta los votos (recién acá se miran, nunca antes)
// y define un ganador. Si hay empate en el primer puesto, no se elige
// nadie automáticamente — el admin lo resuelve a mano con el selector.
window.closeMotmVoting = function (matchId) {
  runAction(async () => {
    const snap = await getDocs(collection(db, "matches", matchId, "motmVotes"));
    const tally = new Map();
    snap.forEach((d) => {
      const votedForId = d.data().votedForId;
      if (!votedForId) return;
      tally.set(votedForId, (tally.get(votedForId) || 0) + 1);
    });
    let winnerId = null;
    if (tally.size > 0) {
      const sorted = [...tally.entries()].sort((a, b) => b[1] - a[1]);
      const topCount = sorted[0][1];
      const tiedAtTop = sorted.filter(([, count]) => count === topCount);
      winnerId = tiedAtTop.length === 1 ? tiedAtTop[0][0] : null;
    }
    await updateDoc(doc(db, "matches", matchId), { motmVotingOpen: false, motmPlayerId: winnerId });
    if (snap.size === 0) showToast("Votación cerrada (todavía no había votado nadie).");
    else if (winnerId) showToast(`Votación cerrada — figura del partido revelada (${snap.size} votos).`);
    else showToast("¡Empate en la votación! Elegí manualmente quién fue la figura.", "error");
  });
};

// Voto de un jugador (puede cambiarlo mientras la votación siga abierta,
// porque simplemente pisa su propio documento). No hay forma de ver quién
// va ganando desde acá: el resultado se conoce recién cuando un admin
// cierra la votación.
window.voteMotm = function (matchId, votedForId) {
  runAction(async () => {
    if (!state.playerId) throw new Error("Elegí tu nombre primero.");
    if (votedForId === state.playerId) throw new Error("No te podés votar a vos mismo.");
    await setDoc(doc(db, "matches", matchId, "motmVotes", state.playerId), {
      votedForId, votedAt: serverTimestamp(),
    });
    showToast("¡Voto registrado! Gracias.");
  });
};

// Bolso de lavado: igual que la figura del partido, es un campo más en el
// documento del partido (matches.bolsoPlayerId) — no hace falta colección
// aparte ni votación, lo designa directamente un admin.
window.setBolso = function (matchId, playerId) {
  runAction(async () => {
    await updateDoc(doc(db, "matches", matchId), { bolsoPlayerId: playerId || null });
    showToast(playerId ? "Bolso asignado." : "Bolso sin asignar.");
  });
};

// El total recaudado combina lo que pagaron los jugadores (subcolección
// "payments") y lo que pagaron los invitados sueltos del partido
// (subcolección "guests") — ambas son de solo-lectura-para-admin, así que
// el total se guarda además como campo público en el propio documento del
// partido (matches.totalRecaudado) para que todo el equipo lo vea sin
// necesidad de poder leer el detalle. El total en sí lo recalculan y
// guardan los listeners de payments/guests (más arriba, syncTotalRecaudado)
// apenas cambia cualquiera de las dos colecciones — acá solo escribimos el
// pago puntual, no hace falta (ni conviene) tocar el total desde acá.

// Plata de la cancha: cuánto pagó cada jugador ese partido.
window.setPayment = function (matchId, playerId, amountStr) {
  runAction(async () => {
    const trimmed = (amountStr || "").trim();
    const amount = trimmed === "" ? null : Number(trimmed);
    if (amount !== null && (isNaN(amount) || amount < 0)) throw new Error("Ese monto no es válido.");
    if (amount === null) {
      await deleteDoc(doc(db, "matches", matchId, "payments", playerId));
    } else {
      await setDoc(doc(db, "matches", matchId, "payments", playerId), { amount });
    }
  });
};

// Atajo para cargar la misma cuota a todos los presentes de una sola vez
// (jugadores E invitados), sin perder la posibilidad de después ajustar a
// mano algún caso puntual (alguien que pagó de más/de menos) con los
// campos de arriba.
window.applySuggestedPayment = function (matchId, amountStr) {
  const amount = Number((amountStr || "").trim());
  if (isNaN(amount) || amount <= 0) { showToast("Poné un monto válido.", "error"); return; }
  const presentIds = presentPlayerIdsForMatch(matchId);
  const guestIds = state.detailGuests.map((g) => g.id);
  if (presentIds.length === 0 && guestIds.length === 0) { showToast("Todavía no marcaste a nadie como presente en Asistencia.", "error"); return; }
  if (!confirm(`¿Aplicar $${amount} a los ${presentIds.length + guestIds.length} presentes (jugadores + invitados)? Esto pisa los montos que ya hayas cargado.`)) return;
  runAction(async () => {
    const batch = writeBatch(db);
    for (const id of presentIds) {
      batch.set(doc(db, "matches", matchId, "payments", id), { amount });
    }
    for (const id of guestIds) {
      batch.update(doc(db, "matches", matchId, "guests", id), { amount });
    }
    await batch.commit();
    showToast("Cuota aplicada a los presentes.");
  });
};

// Invitados sueltos: chicos que van a dar una mano un domingo puntual, sin
// ser parte fija del equipo. Se cargan solo para ESE partido (asistencia +
// plata) y no tocan para nada el plantel ni las estadísticas históricas —
// viven en su propia subcolección, separada de "players".
window.addGuest = function (matchId, name) {
  runAction(async () => {
    if (!name || !name.trim()) throw new Error("Falta el nombre del invitado.");
    await addDoc(collection(db, "matches", matchId, "guests"), {
      name: name.trim(), amount: null, createdAt: serverTimestamp(),
    });
    showToast("Invitado agregado a este partido.");
    const input = document.getElementById(`guest-name-${matchId}`);
    if (input) input.value = "";
  });
};

window.removeGuest = function (matchId, guestId) {
  runAction(async () => {
    await deleteDoc(doc(db, "matches", matchId, "guests", guestId));
  });
};

window.setGuestPayment = function (matchId, guestId, amountStr) {
  runAction(async () => {
    const trimmed = (amountStr || "").trim();
    const amount = trimmed === "" ? null : Number(trimmed);
    if (amount !== null && (isNaN(amount) || amount < 0)) throw new Error("Ese monto no es válido.");
    await updateDoc(doc(db, "matches", matchId, "guests", guestId), { amount });
  });
};

// Asistencia real (distinta del voto "Voy" de antes de jugar): un admin
// marca después del partido quién estuvo de verdad en la cancha. Guardamos
// siempre un documento con present:true/false explícito (nunca lo
// borramos) para que tocar un casillero no afecte a los demás jugadores
// que todavía no se tocaron en este partido (esos siguen usando el voto
// "Voy" como aproximación hasta que alguien los marque a ellos también).
// Se guarda solo, sin botón, apenas se toca cada casillero.
window.toggleAttendance = function (matchId, playerId, present) {

// Trae la tabla de posiciones Y el top de goleadores de la liga (vía la
// función serverless api/standings.js, el único "pedacito de servidor" de
// todo el proyecto — hace falta porque el sitio de la liga no se puede
// leer directo desde el navegador de cada jugador) y los guarda en
// Firestore para que los vea todo el mundo sin tener que volver a pedirlos.
window.refreshStandings = function () {
  state.standingsRefreshing = true;
  route();
  runAction(async () => {
    let data;
    try {
      const res = await fetch("/api/standings");
      data = await res.json();
      if (!res.ok) throw new Error(data.error || "No se pudo traer la tabla de la liga.");
    } catch (err) {
      throw new Error(
        (err && err.message) ||
          "No se pudo contactar a la liga. Puede ser algo temporal — probá de nuevo en un rato."
      );
    }
    await setDoc(doc(db, "config", "standings"), {
      rows: data.rows,
      scorers: data.scorers || [],
      fetchedAt: serverTimestamp(),
    });
    showToast("Tabla de posiciones y goleadores actualizados.");
  }).then(() => {
    state.standingsRefreshing = false;
    route();
  });
};

const REACTION_EMOJIS = ["👍", "😂", "🔥", "👏"];

// Cada jugador tiene como máximo UNA reacción por comentario (elegir otro
// emoji cambia la reacción, tocar el mismo la saca) — se guarda como un mapa
// simple { [playerId]: emoji } en el propio documento del comentario. Se
// actualiza mandando el mapa entero ya modificado (no con arrayUnion ni
// "field paths" con punto) para no depender de esas partes más avanzadas
// del SDK, que además complicarían el mock usado en los tests.
function findComment(commentId) {
  return (
    state.nextMatchComments.find((c) => c.id === commentId) ||
    state.lastPlayedComments.find((c) => c.id === commentId) ||
    state.detailComments.find((c) => c.id === commentId) ||
    null
  );
}

window.postComment = function (matchId, text) {
  const trimmed = (text || "").trim();
  if (!trimmed) return;
  runAction(async () => {
    await addDoc(collection(db, "matches", matchId, "comments"), {
      authorId: state.playerId,
      text: trimmed.slice(0, 500),
      reactions: {},
      createdAt: serverTimestamp(),
    });
    const input = document.getElementById(`comment-input-${matchId}`);
    if (input) input.value = "";
  });
};

window.deleteComment = function (matchId, commentId) {
  if (!confirm("¿Borrar este comentario? No se puede deshacer.")) return;
  runAction(async () => {
    await deleteDoc(doc(db, "matches", matchId, "comments", commentId));
  });
};

window.toggleReaction = function (matchId, commentId, emoji) {
  runAction(async () => {
    const comment = findComment(commentId);
    const next = { ...((comment && comment.reactions) || {}) };
    if (next[state.playerId] === emoji) delete next[state.playerId];
    else next[state.playerId] = emoji;
    await updateDoc(doc(db, "matches", matchId, "comments", commentId), { reactions: next });
  });
};

// =========================================================================
// CUMPLEAÑOS DEL PLANTEL
// =========================================================================
// "Hoy" en el huso horario de Argentina, como partes sueltas — así se puede
// comparar mes/día del cumpleaños de cada uno sin que la zona horaria del
// celu de cada jugador corra la fecha un día para un lado o el otro.
function todayPartsBA() {
  const parts = new Intl.DateTimeFormat("en-CA", {
    timeZone: "America/Argentina/Buenos_Aires", year: "numeric", month: "2-digit", day: "2-digit",
  }).formatToParts(new Date());
  const get = (type) => parts.find((p) => p.type === type).value;
  return { year: get("year"), month: get("month"), day: get("day") };
}

function playersWithBirthdayToday() {
  const today = todayPartsBA();
  return state.players.filter((p) => {
    if (p.active === false || !p.birthday) return false;
    const [, month, day] = p.birthday.split("-");
    return month === today.month && day === today.day;
  });
}

function formatBirthdayShort(birthday) {
  const [, month, day] = birthday.split("-");
  return `${day}/${month}`;
}

const MESES = [
  "Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio",
  "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre",
];

// 3 <select> (día/mes/año) para cargar el cumpleaños de un jugador desde
// Plantel — ver el comentario de setBirthdayPart para el porqué de no usar
// un <input type="date"> nativo.
function birthdayPickerRow(p) {
  const [by, bm, bd] = p.birthday
    ? p.birthday.split("-").map((n) => parseInt(n, 10))
    : [null, null, null];
  const currentYear = parseInt(todayPartsBA().year, 10);
  const years = [];
  for (let y = currentYear - 80; y <= currentYear; y++) years.push(y);
  return `
    <div class="mt-1.5 flex flex-wrap items-center gap-1.5 text-xs text-gray-500" data-birthday-row>
      <span>🎂</span>
      <select data-part="day" onchange="setBirthdayPart('${p.id}', this.closest('[data-birthday-row]'))" class="rounded border border-gray-300 px-1.5 py-1 text-xs">
        <option value="">Día</option>
        ${Array.from({ length: 31 }, (_, i) => i + 1)
          .map((d) => `<option value="${d}" ${bd === d ? "selected" : ""}>${d}</option>`)
          .join("")}
      </select>
      <select data-part="month" onchange="setBirthdayPart('${p.id}', this.closest('[data-birthday-row]'))" class="rounded border border-gray-300 px-1.5 py-1 text-xs">
        <option value="">Mes</option>
        ${MESES.map((m, i) => `<option value="${i + 1}" ${bm === i + 1 ? "selected" : ""}>${m}</option>`).join("")}
      </select>
      <select data-part="year" onchange="setBirthdayPart('${p.id}', this.closest('[data-birthday-row]'))" class="rounded border border-gray-300 px-1.5 py-1 text-xs">
        <option value="">Año</option>
        ${years.map((y) => `<option value="${y}" ${by === y ? "selected" : ""}>${y}</option>`).join("")}
      </select>
      ${p.birthday ? `<span class="text-gray-400">(${formatBirthdayShort(p.birthday)})</span>` : ""}
    </div>
  `;
}

// Cartel de cumpleaños en la pantalla principal: no se muestra nada si hoy
// no cumple años ningún jugador activo.
function birthdayBanner() {
  const celebrants = playersWithBirthdayToday();
  if (celebrants.length === 0) return "";
  const today = todayPartsBA();
  return `
    <div class="overflow-hidden rounded-2xl bg-gradient-to-r from-yellow-400 to-yellow-500 p-5 text-center shadow-sm">
      ${celebrants.map((p) => {
        const birthYear = parseInt(p.birthday.split("-")[0], 10);
        const age = birthYear ? parseInt(today.year, 10) - birthYear : null;
        return `<p class="font-display text-lg font-semibold text-white">🎂 ¡Hoy cumple${age ? ` ${age} años` : ""} ${displayName(p)}! 🎉</p>`;
      }).join("")}
    </div>
  `;
}

// Tarjeta para votar la figura del último partido jugado (cuando un admin
// abrió la votación) o para ver quién ganó (cuando ya se cerró). No se
// muestra nada para partidos donde nunca se usó esta función.
function motmVoteCard(lastPlayed) {
  if (!lastPlayed) return "";
  if (!lastPlayed.motmVotingOpen && !lastPlayed.motmPlayerId) return "";
  const attendanceIds = new Set(state.lastPlayedAttendance.filter((a) => a.present).map((a) => a.id));

  if (!lastPlayed.motmVotingOpen) {
    return `
      <div class="rounded-2xl bg-white p-5 shadow-sm ring-1 ring-gray-100">
        <h3 class="font-semibold text-gray-900">🏅 Figura del partido vs ${escapeHtml(lastPlayed.opponent)}</h3>
        <p class="mt-1 text-sm text-gray-700">${displayNameWithCaptain(state.playersById[lastPlayed.motmPlayerId])}</p>
      </div>
    `;
  }

  const iAttended = !!state.playerId && attendanceIds.has(state.playerId);
  const myVote = state.lastPlayedMotmVotes.find((v) => v.id === state.playerId);
  const candidates = state.players.filter((p) => attendanceIds.has(p.id) && p.id !== state.playerId);

  let body;
  if (!state.playerId) {
    body = `<p class="text-sm text-gray-400">Elegí tu nombre para poder votar.</p>`;
  } else if (!iAttended) {
    body = `<p class="text-sm text-gray-400">Solo pueden votar los que estuvieron en la cancha.</p>`;
  } else if (candidates.length === 0) {
    body = `<p class="text-sm text-gray-400">Todavía no hay candidatos para votar.</p>`;
  } else {
    body = `
      ${myVote
        ? `<p class="mb-2 text-xs text-club-green">✓ Ya votaste — podés cambiar tu voto tocando otro nombre.</p>`
        : `<p class="mb-2 text-xs text-gray-400">Elegí a un compañero (no te podés votar a vos mismo).</p>`}
      <div class="grid grid-cols-2 gap-2">
        ${candidates.map((p) => `
          <button onclick="voteMotm('${lastPlayed.id}','${p.id}')" class="btn rounded-lg px-3 py-2 text-sm font-medium ${myVote && myVote.votedForId === p.id ? "bg-club-green text-white shadow-sm" : "bg-gray-100 text-gray-700 hover:bg-gray-200"}">${displayNameWithCaptain(p)}</button>
        `).join("")}
      </div>
    `;
  }

  return `
    <div class="rounded-2xl bg-white p-5 shadow-sm ring-1 ring-gray-100">
      <h3 class="mb-1 font-semibold text-gray-900">🏅 ¿Quién fue la figura vs ${escapeHtml(lastPlayed.opponent)}?</h3>
      <p class="mb-3 text-xs text-gray-400">Votación abierta — el resultado se revela cuando un admin la cierre.</p>
      ${body}
    </div>
  `;
}

function playerOptionsForMatch(matchId) {
  // La referencia para elegir a quién marcarle un gol/tarjeta es la misma
  // que usa "✅ Asistencia": el casillero explícito de presente si ya se
  // tocó, y si no se tocó todavía, el voto "Voy" como aproximación. Antes
  // esto solo miraba los votos, así que alguien que Lucas marcó presente
  // "a mano" (sin haber confirmado "Voy" durante la semana) no aparecía
  // arriba con el ✓ — ahora sí figura, sea por voto o por asistencia real.
  const presentIds = new Set(presentPlayerIdsForMatch(matchId));
  const confirmed = state.players
    .filter((p) => p.active !== false && presentIds.has(p.id))
    .map((p) => ({ id: p.id, label: "✓ " + displayName(p) }));
  const rest = state.players
    .filter((p) => p.active !== false && !presentIds.has(p.id))
    .map((p) => ({ id: p.id, label: displayName(p) }));
  return [...confirmed, ...rest];
}

// IDs de los jugadores activos que están (o probablemente estén) presentes
// en un partido: mismo criterio que usa la sección "✅ Asistencia" (el
// casillero explícito si ya se tocó, si no el voto "Voy" como aproximación).
// Se usa para no ofrecer cobrarle a alguien que no fue — asume que ya se
// llamó a connectDetailListeners(matchId) para este partido (state.detailAttendance
// corresponde al partido que se está mirando).
function presentPlayerIdsForMatch(matchId) {
  const attendanceMap = new Map(state.detailAttendance.map((a) => [a.id, !!a.present]));
  const voyIds = new Set((state.votesByMatch[matchId] || []).filter((v) => v.response === "VOY").map((v) => v.id));
  return state.players
    .filter((p) => p.active !== false && !p.isDT)
    .filter((p) => (attendanceMap.has(p.id) ? attendanceMap.get(p.id) : voyIds.has(p.id)))
    .map((p) => p.id);
}

function renderAdminPartidoDetalle(matchId) {
  const match = state.matches.find((m) => m.id === matchId);
  if (!match) {
    document.getElementById("app").innerHTML = `<p class="text-sm text-gray-400">No se encontró el partido.</p>`;
    return;
  }
  // Si el partido ya no es "el próximo" (ya se jugó), el listener en vivo de
  // votos sigue apuntando al nuevo próximo partido (si hay uno). Para poder
  // armar la lista de jugadores de este partido pasado, pedimos sus votos
  // una sola vez (no hace falta que sea en vivo, ya se jugó).
  if (!state.votesByMatch[matchId]) {
    getDocs(collection(db, "matches", matchId, "votes")).then((snap) => {
      state.votesByMatch[matchId] = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
      route();
    });
  }
  connectDetailListeners(matchId);

  const playerOptions = playerOptionsForMatch(matchId);
  const goals = state.detailGoals;
  const cards = state.detailCards;

  // Para marcar quién estuvo de verdad: cada jugador que ya se tocó tiene
  // su propio documento explícito (present: true/false) en "attendance".
  // El que todavía no se tocó arranca marcado según si había confirmado
  // "Voy" (para no partir de cero) — el admin destilda a los que dijeron
  // que iban y faltaron, y tilda a los que fueron sin haber confirmado.
  // Al ser por-jugador, tocar un casillero no afecta a los demás.
  const attendanceMap = new Map(state.detailAttendance.map((a) => [a.id, !!a.present]));
  const voyIds = new Set((state.votesByMatch[matchId] || []).filter((v) => v.response === "VOY").map((v) => v.id));
  const activePlayers = state.players.filter((p) => p.active !== false);
  const eligibleVoterCount = activePlayers.filter((p) => (attendanceMap.has(p.id) ? attendanceMap.get(p.id) : voyIds.has(p.id))).length;
  // La plata solo se le cobra a quien fue: se arma con el mismo criterio
  // que "✅ Asistencia" (present explícito, o el voto "Voy" como
  // aproximación mientras nadie tocó su casillero) — así, si Lucas marca
  // primero quién asistió, abajo en "Plata del partido" solo aparecen esos.
  const presentIdsSet = new Set(presentPlayerIdsForMatch(matchId));
  const presentPlayers = activePlayers.filter((p) => presentIdsSet.has(p.id));
  const paymentsMap = new Map(state.detailPayments.map((p) => [p.id, p.amount]));
  const guests = state.detailGuests;
  const paymentsTotal = sumPaymentsAndGuests();

  document.getElementById("app").innerHTML = `
    <div class="space-y-6">
      <div>
        <h1 class="text-xl font-bold text-gray-900">vs ${escapeHtml(match.opponent)}</h1>
        <p class="text-sm text-gray-500">
          ${fmtLong.format(tsToDate(match.date))}
          ${match.status === "JUGADO" ? ` · Resultado: ${match.ourScore} - ${match.theirScore}` : ""}
        </p>
        ${match.status === "JUGADO" ? `<div class="mt-1"><button onclick="revertMatch('${match.id}')" class="text-xs text-red-600 hover:underline">Deshacer resultado (volver a Programado)</button></div>` : ""}
      </div>

      <div class="rounded-2xl bg-white p-5 shadow-sm">
        <h3 class="mb-1 font-semibold text-gray-900">✅ Asistencia</h3>
        <p class="mb-3 text-xs text-gray-400">Quién estuvo de verdad en la cancha (puede ser distinto de quién había confirmado "Voy"). Se guarda solo, al tocar cada casillero.</p>

// La figura del partido vive como campo en el propio documento del
// partido (matches.motmPlayerId), y los partidos ya están siempre en
// memoria por el listener en vivo — no hace falta pedirle nada más a
// Firestore para armar este ranking.
// matchFilter (opcional) recibe el objeto match y devuelve true/false — se
// usa para poder pedir el ranking solo del torneo actual (ver loadStats).
function motmRanking(matchFilter) {
  const counts = new Map();
  for (const m of state.matches) {
    if (m.status !== "JUGADO" || !m.motmPlayerId) continue;
    if (matchFilter && !matchFilter(m)) continue;
    const entry = counts.get(m.motmPlayerId) || { id: m.motmPlayerId, count: 0 };
    entry.count += 1;
    counts.set(m.motmPlayerId, entry);
  }
  return [...counts.values()].sort((a, b) => b.count - a.count);
}

// Ranking de lavado del bolso: mismo mecanismo que la figura del partido
// (campo en el propio documento del partido, matches.bolsoPlayerId).
function bolsoRanking(matchFilter) {
  const counts = new Map();
  for (const m of state.matches) {
    if (m.status !== "JUGADO" || !m.bolsoPlayerId) continue;
    if (matchFilter && !matchFilter(m)) continue;
    const entry = counts.get(m.bolsoPlayerId) || { id: m.bolsoPlayerId, count: 0 };
    entry.count += 1;
    counts.set(m.bolsoPlayerId, entry);
  }
  return [...counts.values()].sort((a, b) => b.count - a.count);
}

      ` : !statsObj ? `<p class="text-sm text-gray-400">Cargando…</p>` : (statsObj.porJugador.length === 0 ? `

const BG_PHOTOS = [
  "/fotos/equipo-1.jpg", "/fotos/equipo-2.jpg", "/fotos/equipo-3.jpg",
  "/fotos/equipo-4.jpg", "/fotos/equipo-5.jpg", "/fotos/equipo-6.jpg",
  "/fotos/equipo-7.jpg",
];
function startBgSlideshow() {
  const container = document.getElementById("bg-slideshow");
  if (!container || BG_PHOTOS.length === 0) return;
  const imgs = BG_PHOTOS.map(() => {
    const img = document.createElement("img");
    img.alt = "";
    container.appendChild(img);
    return img;
  });
  function load(i) {
    if (!imgs[i].src) imgs[i].src = BG_PHOTOS[i];
  }
  let current = 0;
  load(0);
  imgs[0].addEventListener("load", () => imgs[0].classList.add("active"), { once: true });
  load(1 % imgs.length);
  if (imgs.length > 1) {
    setInterval(() => {
      const next = (current + 1) % imgs.length;
      load(next);
      imgs[current].classList.remove("active");
      imgs[next].classList.add("active");
      current = next;
      load((next + 1) % imgs.length);
    }, 9000);
  }
}
setTimeout(startBgSlideshow, 1500);

// Registrar el service worker (PWA) y arrancar el router.
//
// Antes, para ver una actualización de la app había que cerrar la pestaña y
// abrir otra: el navegador solo revisa solo si hay una versión nueva del
// service worker al navegar a la página, así que alguien que dejaba la
// pestaña abierta (por ejemplo, todo el domingo mirando quién confirmó)
// nunca se enteraba. Ahora, además de arreglar el caché de sw.js (ver ese
// archivo), se revisa solo cada un rato mientras la pestaña sigue abierta,
// y en cuanto se detecta y activa una versión nueva, la página se recarga
// sola para mostrarla — sin que nadie tenga que hacer nada.
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/sw.js").then((reg) => {
      setInterval(() => reg.update(), 60 * 1000);
      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible") reg.update();
      });
    }).catch((e) => console.error(e));
  });

  // Si justo estás escribiendo algo (por ejemplo, cargando la plata de un
  // partido) cuando se activa la versión nueva, esperamos a que termines de
  // tocar ese campo antes de recargar, para no perderte lo que estabas por
  // guardar.
  navigator.serviceWorker.addEventListener("controllerchange", () => {
    const active = document.activeElement;
    const isTyping = active && ["INPUT", "TEXTAREA", "SELECT"].includes(active.tagName);
    if (isTyping) {
      active.addEventListener("blur", () => location.reload(), { once: true });
    } else {
      location.reload();
    }
  });
}
route();
