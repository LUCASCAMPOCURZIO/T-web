  window.__tailwindConfig = {

        colors: {

<style>
  body {
    background-color: #f5f5f4;
    background-image: radial-gradient(circle at top, rgba(11,110,44,0.07), transparent 55%);

  /* Pantalla de carga inicial, en CSS puro (nada de Tailwind) — así se ve
     apenas se abre la app, sin esperar a que bajen ni Tailwind ni las
     tipografías ni Firebase. En cuanto la app arranca de verdad, este
     bloque se reemplaza solo (ver el primer renderNavbar()/route()). */
  #boot-splash {
    min-height: 70vh; display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 14px; color: #9ca3af; font-family: system-ui, sans-serif;
  }
  #boot-splash img { width: 56px; height: 56px; border-radius: 9999px; animation: boot-pulse 1.4s ease-in-out infinite; }
  @keyframes boot-pulse { 0%, 100% { opacity: .45; } 50% { opacity: 1; } }

  /* Fondo con fotos del equipo, en blanco y negro y bien atenuado para no
     competir con el contenido — arranca recién unos segundos después de

  #bg-slideshow { position: fixed; inset: 0; z-index: -2; overflow: hidden; background: #e7e7e5; }
  #bg-slideshow img {

    opacity: 0; transition: opacity 2.5s ease;
  }
  #bg-slideshow img.active { opacity: 1; }
  #bg-scrim { position: fixed; inset: 0; z-index: -1; background: rgba(245,245,244,.85); }

  </main>
  <div id="toast" class="pointer-events-none fixed inset-x-0 bottom-4 z-50 flex flex-col items-center gap-2 px-4"></div>

<script type="module" async>
/* =========================================================================
   El Trébol FC — app de un solo archivo (HTML + CSS + JS), sin servidor
   propio: los datos viven en Firebase Firestore y el hosting es estático
   (Vercel/GitHub Pages/lo que sea). Para actualizar la app en el futuro,
   alcanza con reemplazar este archivo.

   No hay contraseña por jugador (se elige el nombre de una lista, como
   antes). El acceso de administrador es un PIN compartido, verificado por
   las reglas de seguridad de Firestore (ver firestore.rules) — el PIN
   nunca se guarda ni se expone en este archivo.
   ========================================================================= */

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import {
  getFirestore, collection, collectionGroup, doc, getDoc, getDocs, setDoc,
  addDoc, updateDoc, deleteDoc, onSnapshot, query, where, orderBy,
  serverTimestamp, writeBatch,
} from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
import {
  getAuth, signInAnonymously, onAuthStateChanged,
} from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

// -------------------------------------------------------------------------
// CONFIGURACIÓN DE FIREBASE
// Estos valores NO son secretos (están pensados para ir en el código del
// cliente); la seguridad real la dan las reglas de Firestore, no que esto
// esté "escondido". Se completan una sola vez, al crear el proyecto de
// Firebase — ver README.md.
// -------------------------------------------------------------------------
const firebaseConfig = {
  apiKey: "AIzaSyB6C0ZgLExepMTC4583TSPpzmemgRUB7qc",
  authDomain: "trebol-fc.firebaseapp.com",
  projectId: "trebol-fc",
  storageBucket: "trebol-fc.firebasestorage.app",
  messagingSenderId: "942872703021",
  appId: "1:942872703021:web:6cde90435253e7873c48a4",
};

const firebaseApp = initializeApp(firebaseConfig);
const db = getFirestore(firebaseApp);
const auth = getAuth(firebaseApp);

// Nombre del torneo actual, solo para mostrarlo en la pantalla de
// Estadísticas junto a la tabla de posiciones. Cuando cambie el torneo,
// actualizá este texto Y el número de torneo en api/standings.js (son dos
// lugares separados porque uno vive en el navegador y el otro en el
// servidor) — ver README.md.
const TORNEO_NOMBRE = "Copa de Oro B4";

// -------------------------------------------------------------------------
// Utilidades
// -------------------------------------------------------------------------
const PLAYER_KEY = "trebol_player_id";

function escapeHtml(str) {
  return String(str ?? "").replace(/[&<>"']/g, (c) => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
  }[c]));
}

function displayName(p) {
  if (!p) return "?";
  return escapeHtml(p.nickname || p.name || "?");
}

// Prefijo con la insignia de capitán, para mostrar junto al nombre en
// pantallas donde tiene sentido (plantel, quién sos, confirmados).
function displayNameWithCaptain(p) {
  if (!p) return "?";
  return (p.isCaptain ? "🎖️ " : "") + displayName(p);
}

function pad(n) { return String(n).padStart(2, "0"); }

// Circulito de color para el puesto en un ranking (goleadores, figuras,
// tabla de posiciones, etc.) — oro/plata/bronce para el podio, verde
// suave para el resto.
function rankBadge(n) {
  const styles = {
    1: "bg-yellow-400 text-yellow-900",
    2: "bg-gray-300 text-gray-700",
    3: "bg-amber-600 text-amber-50",
  };
  const cls = styles[n] || "bg-club-green/10 text-club-green";
  return `<span class="rank-badge ${cls}">${n}</span>`;
}

// Argentina no tiene horario de verano desde 2009: siempre UTC-3.
function toBAInputValue(jsDate) {
  const ba = new Date(jsDate.getTime() - 3 * 60 * 60 * 1000);
  return `${ba.getUTCFullYear()}-${pad(ba.getUTCMonth() + 1)}-${pad(ba.getUTCDate())}T${pad(ba.getUTCHours())}:${pad(ba.getUTCMinutes())}`;
}

function fromBAInputValue(value) {
  const [datePart, timePart] = value.split("T");
  const [y, m, d] = datePart.split("-").map(Number);
  const [hh, mm] = timePart.split(":").map(Number);
  return new Date(Date.UTC(y, m - 1, d, hh + 3, mm, 0));
}

const fmtShort = new Intl.DateTimeFormat("es-AR", {
  weekday: "short", day: "numeric", month: "short",
  hour: "2-digit", minute: "2-digit", timeZone: "America/Argentina/Buenos_Aires",
});
const fmtLong = new Intl.DateTimeFormat("es-AR", {
  weekday: "long", day: "numeric", month: "long", timeZone: "America/Argentina/Buenos_Aires",
});

function tsToDate(ts) {
  return ts && typeof ts.toDate === "function" ? ts.toDate() : new Date(ts);
}

function showToast(message, kind) {
  const el = document.createElement("div");
  el.className =
    "pointer-events-auto rounded-lg px-4 py-2 text-sm font-medium text-white shadow-lg " +
    (kind === "error" ? "bg-red-600" : "bg-club-green");
  el.textContent = message;
  document.getElementById("toast").appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

async function runAction(fn) {
  try {
    await fn();
  } catch (err) {
    console.error(err);
    const msg = err && err.code === "permission-denied"
      ? "No tenés permiso para hacer esto (¿se cerró tu sesión de admin?)."
      : (err && err.message) || "Ocurrió un error.";
    showToast(msg, "error");
  }
}

// -------------------------------------------------------------------------
// Estado global en memoria, alimentado por listeners en vivo de Firestore.
// -------------------------------------------------------------------------
const state = {
  ready: false,
  uid: null,
  isAdmin: false,
  playerId: localStorage.getItem(PLAYER_KEY) || null,
  players: [],
  playersById: {},
  matches: [],
  nextMatch: null,
  recentMatches: [],
  votesByMatch: {}, // matchId -> array of vote docs {id(=playerId), response, ...}
  detailMatchId: null,
  detailGoals: [],
  detailCards: [],
  detailAttendance: [], // asistencia real cargada por un admin para el partido que se está viendo
  stats: null, // {goleadores, asistencias, tarjetas, porJugador}
  statsLoading: false,
  statsError: null,
  statsTab: "torneo", // "torneo" | "historicas" — qué mitad de Estadísticas se ve
  standings: null, // {rows, fetchedAt} — tabla de posiciones de la liga
  standingsRefreshing: false,
};

function currentPlayer() {
  return state.playersById[state.playerId] || null;
}

// -------------------------------------------------------------------------
// Router muy simple basado en location.hash
// -------------------------------------------------------------------------
function navigate(hash) {
  if (location.hash === hash) { route(); } else { location.hash = hash; }
}
window.navigate = navigate;

window.addEventListener("hashchange", route);

function route() {
  const hash = location.hash || "#/";
  render(hash);
}

// -------------------------------------------------------------------------
// Listeners en vivo (se arrancan una vez que hay sesión anónima)
// -------------------------------------------------------------------------
function startListeners() {
  onSnapshot(doc(db, "config", "standings"), (snap) => {
    state.standings = snap.exists() ? snap.data() : null;
    route();
  }, (err) => console.error("standings listener:", err));

  onSnapshot(query(collection(db, "players"), orderBy("name")), (snap) => {
    state.players = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
    state.playersById = Object.fromEntries(state.players.map((p) => [p.id, p]));
    route();
  }, (err) => console.error("players listener:", err));

  // Traemos todos los partidos ordenados por fecha (son pocos por año) y
  // derivamos "próximo" / "recientes" en el cliente: así evitamos tener que
  // crear índices compuestos en Firestore.
  onSnapshot(query(collection(db, "matches"), orderBy("date", "desc")), (snap) => {
    state.matches = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
    const programados = state.matches
      .filter((m) => m.status === "PROGRAMADO")
      .sort((a, b) => tsToDate(a.date) - tsToDate(b.date));
    state.nextMatch = programados[0] || null;
    state.recentMatches = state.matches
      .filter((m) => m.status === "JUGADO" || m.status === "CANCELADO")
      .slice(0, 5);

    // (Re)conectar el listener de votos del próximo partido.
    connectVotesListener(state.nextMatch ? state.nextMatch.id : null);
    route();
  }, (err) => console.error("matches listener:", err));
}

let unsubVotes = null;
let votesListenerMatchId = null;
function connectVotesListener(matchId) {
  if (matchId === votesListenerMatchId) return;
  votesListenerMatchId = matchId;
  if (unsubVotes) { unsubVotes(); unsubVotes = null; }
  if (!matchId) return;
  unsubVotes = onSnapshot(collection(db, "matches", matchId, "votes"), (snap) => {
    state.votesByMatch[matchId] = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
    route();
  }, (err) => console.error("votes listener:", err));
}

let unsubDetail = { goals: null, cards: null, attendance: null };
function connectDetailListeners(matchId) {
  if (state.detailMatchId === matchId) return;
  state.detailMatchId = matchId;
  if (unsubDetail.goals) unsubDetail.goals();
  if (unsubDetail.cards) unsubDetail.cards();
  if (unsubDetail.attendance) unsubDetail.attendance();
  if (!matchId) return;
  unsubDetail.goals = onSnapshot(collection(db, "matches", matchId, "goals"), (snap) => {
    state.detailGoals = snap.docs.map((d) => ({ id: d.id, ...d.data() }))
      .sort((a, b) => (a.createdAt?.seconds ?? 0) - (b.createdAt?.seconds ?? 0));
    route();
  }, (err) => console.error("goals listener:", err));
  unsubDetail.cards = onSnapshot(collection(db, "matches", matchId, "cards"), (snap) => {
    state.detailCards = snap.docs.map((d) => ({ id: d.id, ...d.data() }))
      .sort((a, b) => (a.createdAt?.seconds ?? 0) - (b.createdAt?.seconds ?? 0));
    route();
  }, (err) => console.error("cards listener:", err));
  unsubDetail.attendance = onSnapshot(collection(db, "matches", matchId, "attendance"), (snap) => {
    state.detailAttendance = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
    route();
  }, (err) => console.error("attendance listener:", err));
}

async function loadStats() {
  state.statsLoading = true;
  state.statsError = null;
  route();
  let goalsSnap, cardsSnap, votesSnap, attendanceSnap;
  try {
    [goalsSnap, cardsSnap, votesSnap, attendanceSnap] = await Promise.all([
      getDocs(collectionGroup(db, "goals")),
      getDocs(collectionGroup(db, "cards")),
      getDocs(collectionGroup(db, "votes")),
      getDocs(collectionGroup(db, "attendance")),
    ]);
  } catch (err) {
    console.error("loadStats:", err);
    state.statsError = (err && err.message) || "Error desconocido cargando las estadísticas.";
    state.statsLoading = false;
    route();
    return;
  }
  const goleadoresMap = new Map();
  const asistenciasMap = new Map();
  goalsSnap.forEach((d) => {
    const g = d.data();
    const scorer = goleadoresMap.get(g.scorerId) || { id: g.scorerId, count: 0 };
    scorer.count += 1;
    goleadoresMap.set(g.scorerId, scorer);
    if (g.assistId) {
      const assist = asistenciasMap.get(g.assistId) || { id: g.assistId, count: 0 };
      assist.count += 1;
      asistenciasMap.set(g.assistId, assist);
    }
  });
  const tarjetasMap = new Map();
  cardsSnap.forEach((d) => {
    const c = d.data();
    const entry = tarjetasMap.get(c.playerId) || { id: c.playerId, amarillas: 0, rojas: 0 };
    if (c.type === "AMARILLA") entry.amarillas += 1; else entry.rojas += 1;
    tarjetasMap.set(c.playerId, entry);
  });
  // "Presencias": por cada partido y jugador, preferimos la asistencia real
  // que carga un admin (más precisa); para los jugadores que en ese partido
  // puntual todavía no se tocaron, usamos como aproximación si habían
  // confirmado "Voy". Es por-jugador (no por-partido entero) para que
  // marcar a uno no le haga perder el dato aproximado a los demás.
  const matchAttendance = new Map(); // matchId -> Map(playerId -> present bool)
  attendanceSnap.forEach((d) => {
    const matchId = d.ref.path.split("/")[1];
    if (!matchAttendance.has(matchId)) matchAttendance.set(matchId, new Map());
    matchAttendance.get(matchId).set(d.id, !!d.data().present);
  });
  const voyByMatch = new Map(); // matchId -> Set(playerId)
  const matchIds = new Set(matchAttendance.keys());
  votesSnap.forEach((d) => {
    const v = d.data();
    const matchId = d.ref.path.split("/")[1];
    matchIds.add(matchId);
    if (v.response !== "VOY") return;
    if (!voyByMatch.has(matchId)) voyByMatch.set(matchId, new Set());
    voyByMatch.get(matchId).add(d.id);
  });
  const presenciasMap = new Map();
  matchIds.forEach((matchId) => {
    const explicit = matchAttendance.get(matchId);
    const voy = voyByMatch.get(matchId);
    state.players.forEach((p) => {
      const present = explicit && explicit.has(p.id) ? explicit.get(p.id) : !!(voy && voy.has(p.id));
      if (present) presenciasMap.set(p.id, (presenciasMap.get(p.id) || 0) + 1);
    });
  });
  // Tabla completa: una fila por CADA jugador (incluso sin ningún dato
  // todavía), para que se pueda comparar a todo el plantel de un vistazo.
  const porJugador = state.players.map((p) => ({
    id: p.id,
    presencias: presenciasMap.get(p.id) || 0,
    goles: goleadoresMap.get(p.id)?.count || 0,
    asistencias: asistenciasMap.get(p.id)?.count || 0,
    amarillas: tarjetasMap.get(p.id)?.amarillas || 0,
    rojas: tarjetasMap.get(p.id)?.rojas || 0,
  })).sort((a, b) => displayName(state.playersById[a.id]).localeCompare(displayName(state.playersById[b.id]), "es"));
  state.stats = {
    goleadores: [...goleadoresMap.values()].sort((a, b) => b.count - a.count),
    asistencias: [...asistenciasMap.values()].sort((a, b) => b.count - a.count),
    tarjetas: [...tarjetasMap.values()].sort((a, b) => (b.amarillas + b.rojas) - (a.amarillas + a.rojas)),
    porJugador,
  };
  state.statsLoading = false;
  route();
}

window.retryLoadStats = function () {
  state.statsError = null;
  loadStats();
};

// -------------------------------------------------------------------------
// Arranque: autenticación anónima (necesaria para poder votar y, si
// corresponde, para las reglas de admin) y chequeo de sesión de admin.
// -------------------------------------------------------------------------
onAuthStateChanged(auth, async (user) => {
  if (!user) { await signInAnonymously(auth).catch((e) => console.error(e)); return; }
  state.uid = user.uid;
  try {
    const sessionSnap = await getDoc(doc(db, "adminSessions", user.uid));
    state.isAdmin = sessionSnap.exists();
  } catch (e) {
    state.isAdmin = false;
  }
  state.ready = true;
  startListeners();
  route();
});

// =========================================================================
// ACCIONES (equivalentes a los "server actions" de la versión anterior)
// =========================================================================

window.selectPlayer = function (playerId) {
  state.playerId = playerId;
  localStorage.setItem(PLAYER_KEY, playerId);
  navigate("#/");
};

window.changePlayer = function () {
  state.playerId = null;
  localStorage.removeItem(PLAYER_KEY);
  navigate("#/quien-sos");
};

window.vote = function (matchId, response) {
  runAction(async () => {
    const player = currentPlayer();
    if (!player) throw new Error("Elegí tu nombre primero.");
    await setDoc(doc(db, "matches", matchId, "votes", player.id), {
      response, respondedAt: serverTimestamp(),
    });
    showToast("¡Voto guardado!");
  });
};

window.adminLogin = function (pin) {
  runAction(async () => {
    if (!pin) throw new Error("Ingresá el PIN.");
    await setDoc(doc(db, "adminSessions", state.uid), { pin, createdAt: serverTimestamp() });
    state.isAdmin = true;
    showToast("¡Listo, entraste como admin!");
    navigate("#/admin/partido");
  }).catch(() => {});
};

window.adminLogout = function () {
  runAction(async () => {
    await deleteDoc(doc(db, "adminSessions", state.uid));
    state.isAdmin = false;
    navigate("#/");
  });
};

window.addPlayer = function (name, nickname) {
  runAction(async () => {
    if (!name || !name.trim()) throw new Error("Falta el nombre.");
    await addDoc(collection(db, "players"), {
      name: name.trim(), nickname: nickname && nickname.trim() ? nickname.trim() : null,
      active: true, createdAt: serverTimestamp(),
    });
    showToast("Jugador agregado.");
    document.getElementById("new-player-name").value = "";
    document.getElementById("new-player-nickname").value = "";
  });
};

window.togglePlayerActive = function (playerId, active) {
  runAction(async () => {
    await updateDoc(doc(db, "players", playerId), { active });
  });
};

// Solo puede haber un capitán a la vez: al designar uno nuevo, se le
// quita la insignia a quien la tuviera antes (en el mismo batch).
window.setCaptain = function (playerId) {
  runAction(async () => {
    const batch = writeBatch(db);
    for (const p of state.players) {
      if (p.isCaptain && p.id !== playerId) {
        batch.update(doc(db, "players", p.id), { isCaptain: false });
      }
    }
    batch.update(doc(db, "players", playerId), { isCaptain: true });
    await batch.commit();
    showToast("Nuevo capitán designado.");
  });
};

window.unsetCaptain = function (playerId) {
  runAction(async () => {
    await updateDoc(doc(db, "players", playerId), { isCaptain: false });
  });
};

window.createOrUpdateMatch = function (matchId, date, opponent, sede) {
  runAction(async () => {
    if (!date) throw new Error("Falta la fecha y hora.");
    if (!opponent || !opponent.trim()) throw new Error("Falta el rival.");
    const data = {
      date: fromBAInputValue(date), opponent: opponent.trim(), sede: sede && sede.trim() ? sede.trim() : null,
    };
    if (matchId) {
      await updateDoc(doc(db, "matches", matchId), data);
    } else {
      await addDoc(collection(db, "matches"), {
        ...data, status: "PROGRAMADO", ourScore: null, theirScore: null, createdAt: serverTimestamp(),
      });
    }
    showToast("Partido guardado.");
  });
};

window.markPlayed = function (matchId, ourScore, theirScore) {
  runAction(async () => {
    if (ourScore === "" || theirScore === "") throw new Error("Cargá los dos resultados.");
    await updateDoc(doc(db, "matches", matchId), {
      status: "JUGADO", ourScore: Number(ourScore), theirScore: Number(theirScore),
    });
    navigate(`#/admin/partido/${matchId}`);
  });
};

window.cancelMatch = function (matchId) {
  if (!confirm("¿Seguro que querés cancelar este partido?")) return;
  runAction(async () => {
    await updateDoc(doc(db, "matches", matchId), { status: "CANCELADO" });
  });
};

async function deleteSubcollection(matchId, name) {
  const snap = await getDocs(collection(db, "matches", matchId, name));
  const batch = writeBatch(db);
  snap.forEach((d) => batch.delete(d.ref));
  await batch.commit();
}

window.deleteMatch = function (matchId) {
  if (!confirm("¿Seguro que querés borrar este partido? Se borran también sus goles, tarjetas y votos. No se puede deshacer.")) return;
  runAction(async () => {
    await Promise.all([
      deleteSubcollection(matchId, "votes"),
      deleteSubcollection(matchId, "goals"),
      deleteSubcollection(matchId, "cards"),
    ]);
    await deleteDoc(doc(db, "matches", matchId));
    showToast("Partido borrado.");
  });
};

window.revertMatch = function (matchId) {
  if (!confirm('Esto borra el resultado y todos los goles/tarjetas cargados para este partido, y lo vuelve a dejar como "Programado". ¿Seguro?')) return;
  runAction(async () => {
    await Promise.all([
      deleteSubcollection(matchId, "goals"),
      deleteSubcollection(matchId, "cards"),
    ]);
    await updateDoc(doc(db, "matches", matchId), {
      status: "PROGRAMADO", ourScore: null, theirScore: null,
    });
    navigate("#/admin/partido");
  });
};

window.addGoal = function (matchId, scorerId, assistId) {
  runAction(async () => {
    if (!scorerId) throw new Error("Falta elegir quién hizo el gol.");
    if (assistId && assistId === scorerId) throw new Error("El goleador y el asistidor no pueden ser la misma persona.");
    await addDoc(collection(db, "matches", matchId, "goals"), {
      scorerId, assistId: assistId || null, createdAt: serverTimestamp(),
    });
  });
};

window.deleteGoal = function (matchId, goalId) {
  runAction(async () => { await deleteDoc(doc(db, "matches", matchId, "goals", goalId)); });
};

// "Figura del partido": un campo más en el propio documento del partido
// (no hace falta una colección aparte), así que ya viaja con el resto de
// los datos de "matches" que están siempre en memoria.
window.setMotm = function (matchId, playerId) {
  runAction(async () => {
    await updateDoc(doc(db, "matches", matchId), { motmPlayerId: playerId || null });
    showToast("Figura del partido guardada.");
  });
};

// Asistencia real (distinta del voto "Voy" de antes de jugar): un admin
// marca después del partido quién estuvo de verdad en la cancha. Guardamos
// siempre un documento con present:true/false explícito (nunca lo
// borramos) para que tocar un casillero no afecte a los demás jugadores
// que todavía no se tocaron en este partido (esos siguen usando el voto
// "Voy" como aproximación hasta que alguien los marque a ellos también).
// Se guarda solo, sin botón, apenas se toca cada casillero.
window.toggleAttendance = function (matchId, playerId, present) {
  runAction(async () => {
    const ref = doc(db, "matches", matchId, "attendance", playerId);
    await setDoc(ref, { present: !!present });
  });
};

window.addCard = function (matchId, playerId, type) {
  runAction(async () => {
    if (!playerId) throw new Error("Falta elegir el jugador.");
    await addDoc(collection(db, "matches", matchId, "cards"), {
      playerId, type, createdAt: serverTimestamp(),
    });
  });
};

window.deleteCard = function (matchId, cardId) {
  runAction(async () => { await deleteDoc(doc(db, "matches", matchId, "cards", cardId)); });
};

// Trae la tabla de posiciones Y el top de goleadores de la liga (vía la
// función serverless api/standings.js, el único "pedacito de servidor" de
// todo el proyecto — hace falta porque el sitio de la liga no se puede
// leer directo desde el navegador de cada jugador) y los guarda en
// Firestore para que los vea todo el mundo sin tener que volver a pedirlos.
window.refreshStandings = function () {
  state.standingsRefreshing = true;
  route();
  runAction(async () => {
    let data;
    try {
      const res = await fetch("/api/standings");
      data = await res.json();
      if (!res.ok) throw new Error(data.error || "No se pudo traer la tabla de la liga.");
    } catch (err) {
      throw new Error(
        (err && err.message) ||
          "No se pudo contactar a la liga. Puede ser algo temporal — probá de nuevo en un rato."
      );
    }
    await setDoc(doc(db, "config", "standings"), {
      rows: data.rows,
      scorers: data.scorers || [],
      fetchedAt: serverTimestamp(),
    });
    showToast("Tabla de posiciones y goleadores actualizados.");
  }).then(() => {
    state.standingsRefreshing = false;
    route();
  });
};

window.goToStats = function () {
  navigate("#/estadisticas");
  if (!state.stats) loadStats();
};

window.setStatsTab = function (tab) {
  state.statsTab = tab;

};

  if (!state.ready) {
    document.getElementById("navbar").innerHTML = "";
    document.getElementById("app").innerHTML = `<div class="py-20 text-center text-gray-400">Cargando…</div>`;
    return;
  }

  renderNavbar();

  if (hash.startsWith("#/admin")) {
    if (!state.isAdmin) { renderAdminLogin(); return; }
  }

  if (hash === "#/quien-sos") return renderQuienSos();
  if (hash === "#/admin-login") return state.isAdmin ? navigate("#/admin/partido") : renderAdminLogin();
  if (hash === "#/admin/plantel") return renderAdminPlantel();
  if (hash === "#/admin/partido") return renderAdminPartido();
  if (hash.startsWith("#/admin/partido/")) return renderAdminPartidoDetalle(hash.split("/")[3]);
  if (hash === "#/estadisticas") return renderEstadisticas();

  // Home ("#/" o cualquier otra cosa)
  if (!state.playerId || !currentPlayer()) return renderQuienSos();
  return renderDashboard();
}

function playerOptionsForMatch(matchId) {
  const votes = state.votesByMatch[matchId] || [];
  const confirmedIds = new Set(votes.filter((v) => v.response === "VOY").map((v) => v.id));
  const confirmed = votes
    .filter((v) => v.response === "VOY")
    .map((v) => ({ id: v.id, label: "✓ " + displayName(state.playersById[v.id]) }));
  const rest = state.players
    .filter((p) => p.active !== false && !confirmedIds.has(p.id))
    .map((p) => ({ id: p.id, label: displayName(p) }));
  return [...confirmed, ...rest];
}

function renderAdminPartidoDetalle(matchId) {
  const match = state.matches.find((m) => m.id === matchId);
  if (!match) {
    document.getElementById("app").innerHTML = `<p class="text-sm text-gray-400">No se encontró el partido.</p>`;
    return;
  }
  // Si el partido ya no es "el próximo" (ya se jugó), el listener en vivo de
  // votos sigue apuntando al nuevo próximo partido (si hay uno). Para poder
  // armar la lista de jugadores de este partido pasado, pedimos sus votos
  // una sola vez (no hace falta que sea en vivo, ya se jugó).
  if (!state.votesByMatch[matchId]) {
    getDocs(collection(db, "matches", matchId, "votes")).then((snap) => {
      state.votesByMatch[matchId] = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
      route();
    });
  }
  connectDetailListeners(matchId);

  const playerOptions = playerOptionsForMatch(matchId);
  const goals = state.detailGoals;
  const cards = state.detailCards;

  // Para marcar quién estuvo de verdad: cada jugador que ya se tocó tiene
  // su propio documento explícito (present: true/false) en "attendance".
  // El que todavía no se tocó arranca marcado según si había confirmado
  // "Voy" (para no partir de cero) — el admin destilda a los que dijeron
  // que iban y faltaron, y tilda a los que fueron sin haber confirmado.
  // Al ser por-jugador, tocar un casillero no afecta a los demás.
  const attendanceMap = new Map(state.detailAttendance.map((a) => [a.id, !!a.present]));
  const voyIds = new Set((state.votesByMatch[matchId] || []).filter((v) => v.response === "VOY").map((v) => v.id));
  const activePlayers = state.players.filter((p) => p.active !== false);

  document.getElementById("app").innerHTML = `
    <div class="space-y-6">
      <div>
        <h1 class="text-xl font-bold text-gray-900">vs ${escapeHtml(match.opponent)}</h1>
        <p class="text-sm text-gray-500">
          ${fmtLong.format(tsToDate(match.date))}
          ${match.status === "JUGADO" ? ` · Resultado: ${match.ourScore} - ${match.theirScore}` : ""}
        </p>
        ${match.status === "JUGADO" ? `<div class="mt-1"><button onclick="revertMatch('${match.id}')" class="text-xs text-red-600 hover:underline">Deshacer resultado (volver a Programado)</button></div>` : ""}
      </div>

      <div class="rounded-2xl bg-white p-5 shadow-sm">
        <h3 class="mb-1 font-semibold text-gray-900">✅ Asistencia</h3>
        <p class="mb-3 text-xs text-gray-400">Quién estuvo de verdad en la cancha (puede ser distinto de quién había confirmado "Voy"). Se guarda solo, al tocar cada casillero.</p>
        ${activePlayers.length === 0 ? `<p class="text-sm text-gray-400">Todavía no hay jugadores cargados.</p>` : `
          <ul class="space-y-1.5">
            ${activePlayers.map((p) => {
              const checked = attendanceMap.has(p.id) ? attendanceMap.get(p.id) : voyIds.has(p.id);
              return `
                <li class="flex items-center justify-between rounded-lg bg-gray-50 px-3 py-2 text-sm">

      <div class="rounded-2xl bg-white p-5 shadow-sm">
        <h3 class="mb-3 font-semibold text-gray-900">Goles</h3>

          ${goals.length === 0 ? `<p class="text-sm text-gray-400">Todavía no hay goles cargados.</p>` : `
            <ul class="space-y-1.5">

                  <span>⚽ ${displayName(state.playersById[g.scorerId])}${g.assistId ? ` <span class="text-gray-400">(asistencia de ${displayName(state.playersById[g.assistId])})</span>` : ""}</span>

              `).join("")}

        <form onsubmit="event.preventDefault(); addGoal('${matchId}', document.getElementById('goal-scorer').value, document.getElementById('goal-assist').value); this.reset(); return false;" class="grid grid-cols-2 gap-2">

          </select>
          <button type="submit" class="btn col-span-2 rounded-lg bg-club-green px-3 py-2 text-sm font-semibold text-white hover:opacity-90">Agregar gol</button>
        </form>
      </div>

      <div class="rounded-2xl bg-white p-5 shadow-sm">
        <h3 class="mb-3 font-semibold text-gray-900">Tarjetas</h3>
        <div class="mb-4">
          ${cards.length === 0 ? `<p class="text-sm text-gray-400">Todavía no hay tarjetas cargadas.</p>` : `
            <ul class="space-y-1.5">
              ${cards.map((c) => `
                <li class="flex items-center justify-between rounded-lg bg-gray-50 px-3 py-2 text-sm">
                  <span>${c.type === "AMARILLA" ? "🟨" : "🟥"} ${displayName(state.playersById[c.playerId])}</span>
                  <button onclick="deleteCard('${matchId}','${c.id}')" class="text-xs text-red-600 hover:underline">Quitar</button>

          </select>
          <select id="card-type" required class="col-span-2 rounded-lg border border-gray-300 px-2 py-2 text-sm sm:col-span-1">

            <option value="ROJA">🟥 Roja</option>
          </select>
          <button type="submit" class="btn col-span-2 rounded-lg bg-club-green px-3 py-2 text-sm font-semibold text-white hover:opacity-90">Agregar tarjeta</button>
        </form>
      </div>
    </div>
  `;
}

// La figura del partido vive como campo en el propio documento del
// partido (matches.motmPlayerId), y los partidos ya están siempre en
// memoria por el listener en vivo — no hace falta pedirle nada más a
// Firestore para armar este ranking.
function motmRanking() {
  const counts = new Map();
  for (const m of state.matches) {
    if (m.status !== "JUGADO" || !m.motmPlayerId) continue;
    const entry = counts.get(m.motmPlayerId) || { id: m.motmPlayerId, count: 0 };
    entry.count += 1;
    counts.set(m.motmPlayerId, entry);
  }
  return [...counts.values()].sort((a, b) => b.count - a.count);
}

// Fondo con fotos del equipo (carpeta fotos/), en blanco y negro y
// atenuadas — van cambiando de a una cada tanto con un fundido suave.
// Arranca con un pequeño retraso y carga las fotos de a una (nunca todas
// juntas) para no competir con lo importante durante la carga inicial.
const BG_PHOTOS = [
  "/fotos/equipo-1.jpg", "/fotos/equipo-2.jpg", "/fotos/equipo-3.jpg",
  "/fotos/equipo-4.jpg", "/fotos/equipo-5.jpg", "/fotos/equipo-6.jpg",
  "/fotos/equipo-7.jpg",
];
function startBgSlideshow() {
  const container = document.getElementById("bg-slideshow");
  if (!container || BG_PHOTOS.length === 0) return;
  const imgs = BG_PHOTOS.map(() => {
    const img = document.createElement("img");
    img.alt = "";
    container.appendChild(img);
    return img;
  });
  function load(i) {
    if (!imgs[i].src) imgs[i].src = BG_PHOTOS[i];
  }
  let current = 0;
  load(0);
  imgs[0].addEventListener("load", () => imgs[0].classList.add("active"), { once: true });
  load(1 % imgs.length);
  if (imgs.length > 1) {
    setInterval(() => {
      const next = (current + 1) % imgs.length;
      load(next);
      imgs[current].classList.remove("active");
      imgs[next].classList.add("active");
      current = next;
      load((next + 1) % imgs.length);
    }, 9000);
  }
}
setTimeout(startBgSlideshow, 1500);

// Registrar el service worker (PWA) y arrancar el router.
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/sw.js").catch((e) => console.error(e));
  });
}
route();
