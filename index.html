<style>
  body { background: #f5f4f0; font-family: 'Inter', system-ui, sans-serif; }
  .font-display { font-family: 'Oswald', system-ui, sans-serif; letter-spacing: .02em; }
  .btn { transition: opacity .15s, transform .15s; }
  .btn:disabled { opacity: .45; cursor: not-allowed; }
  .btn:active:not(:disabled) { transform: scale(.97); }

  /* Badge de nivel */
  .badge-gold   { background:#FEF3C7; color:#92400E; }
  .badge-silver { background:#E5E7EB; color:#374151; }
  .badge-bronze { background:#FDE8D8; color:#7C2D12; }

  /* Barra de progreso */
  .bar-wrap { height:6px; background:#E5E7EB; border-radius:99px; overflow:hidden; margin-top:5px; }
  .bar-fill { height:100%; border-radius:99px; transition: width .4s; }

  /* Splash */
  #boot-splash { min-height:70vh; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; color:#9ca3af; }
  #boot-splash .logo-txt { font-family:'Oswald',sans-serif; font-size:2.5rem; font-weight:700; color:#162247; }
  @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }

  /* Card hover */
  .card-hover { transition: box-shadow .15s; }
  .card-hover:hover { box-shadow: 0 4px 16px -4px rgba(22,34,71,.15); }

  /* Animación entrada */
  @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .fade-up { animation: fadeUp .25s ease both; }

  /* Stars */
  .star-on  { color:#F59E0B; }
  .star-off { color:#D1D5DB; }

  /* Modal overlay */
  .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:50; display:flex; align-items:center; justify-content:center; padding:1rem; }
  .modal-box { background:#fff; border-radius:16px; padding:1.5rem; width:100%; max-width:420px; max-height:90vh; overflow-y:auto; }

  /* Toast */
  #toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:#162247; color:#fff; padding:10px 20px; border-radius:99px; font-size:.875rem; opacity:0; transition:opacity .3s; pointer-events:none; z-index:100; white-space:nowrap; }
  #toast.show { opacity:1; }

  input, select, textarea {
    border: 1px solid #D1D5DB;

  label { font-size: .8rem; font-weight:500; color:#374151; display:block; margin-bottom:4px; }
</style>

<script type="module">
import { initializeApp }   from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import {
  getFirestore, collection, doc, getDoc, getDocs, setDoc,
  addDoc, updateDoc, deleteDoc, onSnapshot, query, where,
  orderBy, serverTimestamp, writeBatch, limit,
} from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
import {
  getAuth, signInAnonymously, onAuthStateChanged, signOut,
} from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

// ── FIREBASE CONFIG ──────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey:            "AIzaSyCPQVuhxFDLafjcP6aVlOG_tlBmEIlyFZ8",
  authDomain:        "objetivosas13.firebaseapp.com",
  projectId:         "objetivosas13",
  storageBucket:     "objetivosas13.firebasestorage.app",
  messagingSenderId: "589275226120",
  appId:             "1:589275226120:web:0dba85b76a3a5c5840b1bd",
};

const app  = initializeApp(firebaseConfig);
const db   = getFirestore(app);
const auth = getAuth(app);

// ── HELPERS ──────────────────────────────────────────────────────────────
function esc(s) {
  return String(s ?? "").replace(/[&<>"']/g, c =>
    ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
}

function toast(msg, dur = 2500) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), dur);
}

// Metas de reseñas por fuente
const METAS = {
  google:      4.6,
  pedidosya_h: 4.7,
  pedidosya_c: 4.7,
  salon:       4.8,
};

function formatFecha(fecha) {
  if (!fecha) return "";
  const [y, m, d] = fecha.split("-");
  const meses = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
  return `${parseInt(d)} ${meses[parseInt(m)-1]}`;
}

function mesActual() {
  const n = new Date();
  return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,"0")}`;
}

function mesLabel(ym) {
  if (!ym) return "";
  const [y, m] = ym.split("-");
  const nombres = ["Enero","Febrero","Marzo","Abril","Mayo","Junio",
                   "Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
  return `${nombres[parseInt(m)-1]} ${y}`;
}

function nivelBadge(pts) {
  if (pts >= 80) return `<span class="badge-gold text-xs font-semibold px-2 py-0.5 rounded-full">🥇 Oro</span>`;
  if (pts >= 60) return `<span class="badge-silver text-xs font-semibold px-2 py-0.5 rounded-full">🥈 Plata</span>`;
  if (pts >= 40) return `<span class="badge-bronze text-xs font-semibold px-2 py-0.5 rounded-full">🥉 Bronce</span>`;
  return `<span class="badge-none text-xs font-semibold px-2 py-0.5 rounded-full">En construcción</span>`;
}

function nivelColor(pts) {
  if (pts >= 80) return "#F59E0B";
  if (pts >= 60) return "#9CA3AF";
  if (pts >= 40) return "#FB923C";
  return "#E5E7EB";
}

function starsHtml(val) {
  let s = "";
  for (let i = 1; i <= 5; i++)
    s += `<span class="${i <= Math.round(val) ? "star-on" : "star-off"}">★</span>`;
  return s;
}

// ── ESTADO GLOBAL ────────────────────────────────────────────────────────
let currentUser   = null;
let isAdmin       = false;
let empleados     = [];
let currentView   = "";
let unsubListeners = [];
let uid           = null;

function clearSubs() {
  unsubListeners.forEach(u => u());
  unsubListeners = [];
}

// ── AUTH ─────────────────────────────────────────────────────────────────
onAuthStateChanged(auth, async user => {
  if (!user) {
    await signInAnonymously(auth).catch(e => console.error(e));
    return;
  }
  currentUser = user;
  uid = user.uid;

  // Verificar si es admin (tiene sesión admin activa en Firestore)
  try {
    const sesSnap = await getDoc(doc(db, "adminSessions", uid));
    isAdmin = sesSnap.exists();
  } catch(e) {
    isAdmin = false;
  }

  if (isAdmin) {
    showAdminNav();
  } else {
    showPublicNav();
  }
  await loadEmpleados();
  const hash = location.hash.slice(1);
  route(hash || (isAdmin ? "admin-dashboard" : "inicio"));
});

function showAdminNav() {
  document.getElementById("bottom-nav").classList.add("hidden");
  document.getElementById("admin-nav").classList.remove("hidden");
}
function showPublicNav() {
  document.getElementById("admin-nav").classList.add("hidden");
  document.getElementById("bottom-nav").classList.remove("hidden");
}

async function loadEmpleados() {
  try {
    const snap = await getDocs(query(collection(db,"empleados"), orderBy("nombre")));
    empleados = snap.docs.map(d => ({ id: d.id, ...d.data() }))
                         .filter(e => e.activo !== false);
  } catch(e) {
    empleados = [];
  }
}

// ── ROUTER ───────────────────────────────────────────────────────────────
window.route = function(view) {
  clearSubs();
  currentView = view;
  location.hash = view;
  updateNavActive(view);
  const app = document.getElementById("app");
  app.innerHTML = "";

  const pub  = ["inicio","ranking","resenas","comentarios"];
  const adm  = ["admin-dashboard","admin-empleados","admin-evaluar",
                 "admin-limpieza","admin-resenas","admin-login"];

  if (adm.includes(view) && !isAdmin && view !== "admin-login") {
    renderAdminLogin(); return;
  }

  switch(view) {
    case "inicio":           renderInicio(); break;
    case "ranking":          renderRanking(); break;
    case "resenas":          renderResenas(); break;
    case "comentarios":      renderComentarios(); break;
    case "admin-login":      renderAdminLogin(); break;
    case "admin-dashboard":  renderAdminDashboard(); break;
    case "admin-empleados":  renderAdminEmpleados(); break;
    case "admin-evaluar":    renderAdminEvaluar(); break;
    case "admin-limpieza":   renderAdminLimpieza(); break;
    case "admin-resenas":    renderAdminResenas(); break;
    default:                 renderInicio();
  }
};

function updateNavActive(view) {
  document.querySelectorAll(".nav-btn").forEach(b => {
    const active = b.dataset.view === view;
    b.classList.toggle("text-as-orange", active);
    b.classList.toggle("text-white/50", !active);
  });
}

// ── TOPBAR ───────────────────────────────────────────────────────────────
function topbar(title, showBack = false, showAdmin = false) {
  return `
  <div class="bg-as-navy text-white px-4 py-3 flex items-center gap-3 sticky top-0 z-30">
    ${showBack ? `<button onclick="history.back()" class="p-1 -ml-1">
      <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    </button>` : `<span class="font-display text-xl font-bold text-as-orange tracking-wide">AS13</span>`}
    <span class="font-semibold text-sm flex-1">${esc(title)}</span>
    ${showAdmin && !isAdmin ? `<button onclick="route('admin-login')" class="text-xs text-white/40 hover:text-white/70 transition-colors">Admin</button>` : ""}
    ${isAdmin ? `<button onclick="doSignOut()" class="text-xs text-white/40 hover:text-white/70 transition-colors">Salir</button>` : ""}
  </div>`;
}

window.doSignOut = async function() {
  // Solo cerramos la sesión admin, no la sesión anónima
  try { await deleteDoc(doc(db, "adminSessions", uid)); } catch(e) {}
  isAdmin = false;
  showPublicNav();
  toast("Sesión de admin cerrada");
  route("inicio");
};

// ═══════════════════════════════════════════════════════════════
// VISTAS PÚBLICAS
// ═══════════════════════════════════════════════════════════════

// ── INICIO ───────────────────────────────────────────────────────────────
async function renderInicio() {
  const mes = mesActual();
  const app = document.getElementById("app");
  app.innerHTML = topbar("Inicio", false, true) + `
  <div class="fade-up px-4 pt-4 pb-24 space-y-4">

    <div class="bg-as-navy rounded-2xl p-5 text-white">
      <p class="text-xs text-white/60 font-display tracking-widest uppercase mb-1">AS13 · 10 años</p>
      <h1 class="font-display text-2xl font-bold mb-1">${mesLabel(mes)}</h1>
      <p class="text-sm text-white/70">Sistema de desafíos del equipo</p>
    </div>

    <div id="inicio-stats" class="grid grid-cols-2 gap-3">
      <div class="bg-white rounded-xl p-4 text-center animate-pulse"><div class="h-8 bg-gray-100 rounded"></div></div>
      <div class="bg-white rounded-xl p-4 text-center animate-pulse"><div class="h-8 bg-gray-100 rounded"></div></div>
    </div>

    <div class="bg-white rounded-xl p-4">
      <h2 class="font-semibold text-sm text-gray-700 mb-3">Ranking del mes</h2>
      <div id="inicio-ranking">
        <div class="space-y-2">
          ${[1,2,3].map(() => `<div class="h-10 bg-gray-100 rounded-lg animate-pulse"></div>`).join("")}
        </div>
      </div>
      <button onclick="route('ranking')" class="mt-3 w-full text-xs text-as-orange font-medium">Ver ranking completo →</button>
    </div>

    <div class="bg-white rounded-xl p-4">
      <h2 class="font-semibold text-sm text-gray-700 mb-3">Reseñas del mes</h2>
      <div id="inicio-resenas">
        <div class="h-16 bg-gray-100 rounded-lg animate-pulse"></div>
      </div>
      <button onclick="route('resenas')" class="mt-3 w-full text-xs text-as-orange font-medium">Ver todas las reseñas →</button>
    </div>

    <div id="cumple-card"></div>

    <button onclick="route('comentarios')" class="w-full bg-as-orange text-white rounded-xl py-3 font-semibold text-sm btn">
      💬 Dejar un comentario
    </button>

  </div>`;

  // Cargar stats reales
  loadInicioData(mes);
}

async function loadInicioData(mes) {
  try {
    // Conteo empleados activos
    const nEmp = empleados.length;

    // Evaluaciones del mes para stats
    const evals = await getDocs(
      query(collection(db,"evaluaciones"), where("mes","==",mes))
    );
    const ptsMap = {};
    evals.forEach(d => {
      const v = d.data();
      if (!ptsMap[v.empleadoId]) ptsMap[v.empleadoId] = 0;
      ptsMap[v.empleadoId] += (v.puntos || 0);
    });

    const ranking = empleados.map(e => ({
      ...e, pts: Math.min(ptsMap[e.id] || 0, 100)
    })).sort((a,b) => b.pts - a.pts);

    const enOro = ranking.filter(e => e.pts >= 80).length;

    // Stats cards
    document.getElementById("inicio-stats").innerHTML = `
      <div class="bg-white rounded-xl p-4 text-center">
        <p class="text-2xl font-bold text-as-navy">${nEmp}</p>
        <p class="text-xs text-gray-500 mt-1">Empleados activos</p>
      </div>
      <div class="bg-white rounded-xl p-4 text-center">
        <p class="text-2xl font-bold text-amber-500">${enOro}</p>
        <p class="text-xs text-gray-500 mt-1">En nivel Oro</p>
      </div>`;

    // Top 3
    document.getElementById("inicio-ranking").innerHTML = ranking.slice(0,3).map((e,i) => `
      <div class="flex items-center gap-3 py-2 ${i < 2 ? "border-b border-gray-100" : ""}">
        <span class="w-6 h-6 rounded-full bg-gray-100 text-xs font-bold flex items-center justify-content text-gray-600 flex-shrink-0" style="display:flex;align-items:center;justify-content:center">${i+1}</span>
        <div class="flex-1 min-w-0">
          <p class="text-sm font-medium text-gray-800 truncate">${esc(e.nombre)}</p>
          <div class="bar-wrap"><div class="bar-fill" style="width:${e.pts}%;background:${nivelColor(e.pts)}"></div></div>
        </div>
        <div class="text-right flex-shrink-0">
          <p class="text-sm font-bold text-gray-800">${e.pts}</p>
          <p class="text-xs text-gray-400">pts</p>
        </div>
      </div>`).join("") || `<p class="text-sm text-gray-400 text-center py-4">Sin datos este mes</p>`;

    // Cumpleaños hoy
    const hoy = new Date();
    const diaHoy = String(hoy.getDate()).padStart(2,"0");
    const mesHoy = String(hoy.getMonth()+1).padStart(2,"0");
    const cumplHoy = empleados.filter(e => {
      if (!e.nacimiento) return false;
      const partes = e.nacimiento.split("-");
      return partes[1] === mesHoy && partes[2] === diaHoy;
    });

    const cumpleCard = document.getElementById("cumple-card");
    if (cumpleCard) {
      if (cumplHoy.length > 0) {
        cumpleCard.innerHTML = `
          <div class="bg-amber-50 border border-amber-200 rounded-xl p-4 flex items-center gap-3">
            <span class="text-3xl">🎂</span>
            <div>
              <p class="font-semibold text-amber-800">¡Hoy es el cumple de ${cumplHoy.map(e => esc(e.nombre)).join(" y ")}!</p>
              <p class="text-xs text-amber-600 mt-0.5">No te olvidés de felicitarlo/a 🎉</p>
            </div>
          </div>`;
      } else {
        // Próximo cumpleaños
        const proximos = empleados.filter(e => e.nacimiento).map(e => {
          const partes = e.nacimiento.split("-");
          const dia = parseInt(partes[2]);
          const mes = parseInt(partes[1]) - 1;
          const proximo = new Date(hoy.getFullYear(), mes, dia);
          if (proximo < hoy) proximo.setFullYear(hoy.getFullYear() + 1);
          const diff = Math.ceil((proximo - hoy) / (1000*60*60*24));
          return { ...e, diff };
        }).sort((a,b) => a.diff - b.diff);
        
        if (proximos.length > 0 && proximos[0].diff <= 7) {
          const p = proximos[0];
          cumpleCard.innerHTML = `
            <div class="bg-blue-50 border border-blue-100 rounded-xl p-3 flex items-center gap-3">
              <span class="text-2xl">🎂</span>
              <p class="text-sm text-blue-700">Cumple de <strong>${esc(p.nombre)}</strong> en ${p.diff} día${p.diff===1?"":"s"}</p>
            </div>`;
        }
      }
    }

    // Reseñas
    const rSnap = await getDocs(
      query(collection(db,"resenas"), where("mes","==",mes))
    );
    const resenas = {};
    rSnap.forEach(d => { const v = d.data(); resenas[v.fuente] = v.puntaje; });

    const fuentes = [
      {k:"google",      label:"Google",                 icon:"🔍"},
      {k:"pedidosya_h", label:"PedidosYa Hamburguesería", icon:"🍔"},
      {k:"pedidosya_c", label:"PedidosYa Cafetería",    icon:"☕"},
      {k:"salon",       label:"Salón",                  icon:"🪑"},
    ];

    const todosOk = fuentes.every(f => resenas[f.k] && parseFloat(resenas[f.k]) >= METAS[f.k]);
    document.getElementById("inicio-resenas").innerHTML =
      (todosOk ? `<div class="flex items-center gap-2 mb-2 bg-green-50 rounded-lg px-3 py-2">
        <span>🏆</span><p class="text-xs font-semibold text-green-700">¡Objetivos del mes alcanzados!</p>
      </div>` : "") +
      `<div class="flex gap-1">
        ${fuentes.map(f => {
          const v = resenas[f.k];
          const ok = v && parseFloat(v) >= METAS[f.k];
          return `<div class="flex-1 text-center">
            <p class="text-base">${f.icon}</p>
            <p class="text-[10px] text-gray-400 leading-tight truncate">${f.label.replace("PedidosYa ","PY ")}</p>
            <p class="text-sm font-bold ${ok ? "text-green-600" : v ? "text-as-navy" : "text-gray-300"}">${v ? parseFloat(v).toFixed(1) : "—"}</p>
            <p class="text-[10px] ${ok ? "text-green-500" : "text-gray-300"}">${ok ? "✓" : METAS[f.k].toFixed(1)+"★"}</p>
          </div>`;
        }).join("")}
      </div>`;

  } catch(e) {
    console.error(e);
  }
}

    ];

    // Verificar si TODOS los objetivos están alcanzados
    const todosAlcanzados = fuentes.every(f => {
      const r = resMap[f.k];
      return r && parseFloat(r.puntaje) >= METAS[f.k];
    });
    const algunoRegistrado = fuentes.some(f => resMap[f.k]);

    // Banner de objetivos alcanzados
    let bannerHtml = "";
    if (todosAlcanzados && algunoRegistrado) {
      bannerHtml = `
        <div class="bg-green-50 border-2 border-green-300 rounded-xl p-4 flex items-center gap-3 mb-1">
          <span class="text-3xl">🏆</span>
          <div>
            <p class="font-bold text-green-800 text-sm">¡Objetivos del mes alcanzados!</p>
            <p class="text-xs text-green-600 mt-0.5">Todas las reseñas superan la meta. ¡Excelente trabajo equipo!</p>
          </div>
        </div>`;
    }

    document.getElementById("resenas-cards").innerHTML = bannerHtml + fuentes.map(f => {
      const r = resMap[f.k];
      const meta = METAS[f.k];
      const puntaje = r ? parseFloat(r.puntaje) : null;
      const alcanzado = puntaje !== null && puntaje >= meta;
      const color = puntaje === null ? "text-gray-300" : alcanzado ? "text-green-600" : "text-as-orange";
      return `
      <div class="bg-white rounded-xl p-4 ${alcanzado ? "border-l-4 border-green-400" : ""}">
        <div class="flex items-center gap-3">
          <span class="text-2xl">${f.icon}</span>
          <div class="flex-1">
            <p class="font-semibold text-sm text-gray-800">${f.label}</p>
            <p class="text-xs text-gray-400">Meta: <span class="font-medium text-gray-600">${meta.toFixed(1)} ★</span></p>
          </div>
          <div class="text-right">
            ${puntaje !== null ? `
              <p class="text-2xl font-bold ${color}">${puntaje.toFixed(1)}</p>
              <div class="text-sm">${starsHtml(puntaje)}</div>
              ${alcanzado ? `<p class="text-xs text-green-600 font-semibold mt-0.5">✓ Meta lograda</p>` : `<p class="text-xs text-orange-500 mt-0.5">Faltan ${(meta - puntaje).toFixed(1)} pts</p>`}
            ` : `<p class="text-sm text-gray-300 font-medium">Sin registrar</p>`}
          </div>
        </div>
      </div>`;
    }).join("");

    // Historial últimos 4 meses
    const histSnap = await getDocs(
      query(collection(db,"resenas"), orderBy("mes","desc"), limit(20))
    );
    const histMeses = {};
    histSnap.forEach(d => {
      const v = d.data();
      if (!histMeses[v.mes]) histMeses[v.mes] = {};
      histMeses[v.mes][v.fuente] = v.puntaje;
    });

    const meses = Object.keys(histMeses).sort().reverse().filter(m => m !== mes).slice(0,3);
    document.getElementById("resenas-historial").innerHTML = meses.length
      ? meses.map(m => `
        <div class="bg-white rounded-xl p-3">
          <p class="text-xs font-medium text-gray-500 mb-2">${mesLabel(m)}</p>
          <div class="flex gap-4">
            ${["google","pedidosya_h","pedidosya_c","salon"].map(k => {
              const v = histMeses[m][k];

              return `<div class="text-center">
                <p class="text-xs text-gray-400">${lbl}</p>

            }).join("")}

        </div>`).join("")
      : `<p class="text-sm text-gray-400 text-center py-4">Sin historial aún</p>`;

  } catch(e) {
    document.getElementById("resenas-cards").innerHTML =
      `<p class="text-sm text-red-500 text-center py-8">Error al cargar</p>`;
  }
}

window.enviarComentario = async function() {
  const nombre = document.getElementById("com-nombre").value;
  const texto  = document.getElementById("com-texto").value.trim();
  if (!nombre) { toast("Elegí tu nombre primero"); return; }
  if (!texto)  { toast("Escribí algo primero"); return; }

  const btn = document.getElementById("com-btn");
  btn.disabled = true; btn.textContent = "Enviando…";

  try {
    const emp = empleados.find(e => e.id === nombre);
    await addDoc(collection(db,"comentarios"), {
      nombre:     emp ? emp.nombre : nombre,
      empleadoId: nombre,
      texto,
      createdAt:  serverTimestamp(),
    });
    document.getElementById("com-texto").value = "";
    document.getElementById("com-nombre").value = "";
    toast("Comentario enviado ✓");
  } catch(e) {
    toast("Error al enviar, intentá de nuevo");
  } finally {
    btn.disabled = false; btn.textContent = "Enviar comentario";
  }
};

window.borrarComentario = async function(id) {
  if (!confirm("¿Eliminar este comentario?")) return;
  await deleteDoc(doc(db,"comentarios",id));
  toast("Comentario eliminado");
};

window.doLogin = async function() {
  const pin = document.getElementById("login-pin").value.trim();
  const err = document.getElementById("login-error");
  const btn = document.getElementById("login-btn");
  err.classList.add("hidden");
  if (!pin) { err.textContent = "Ingresá el PIN"; err.classList.remove("hidden"); return; }
  btn.disabled = true; btn.textContent = "Verificando…";
  try {
    // Guardamos el PIN en Firestore — las reglas verifican que sea correcto
    await setDoc(doc(db, "adminSessions", uid), { pin, createdAt: serverTimestamp() });
    // Verificar que la sesión quedó guardada (las reglas la aceptan solo si el PIN es válido)
    const sesSnap = await getDoc(doc(db, "adminSessions", uid));
    if (sesSnap.exists()) {
      isAdmin = true;
      showAdminNav();
      route("admin-dashboard");
      toast("¡Bienvenido, admin! ✓");
    } else {
      err.textContent = "PIN incorrecto";
      err.classList.remove("hidden");
      btn.disabled = false; btn.textContent = "Ingresar";
    }
  } catch(e) {
    err.textContent = "PIN incorrecto";
    err.classList.remove("hidden");
    btn.disabled = false; btn.textContent = "Ingresar";
  }
};

            <p class="text-xs font-semibold text-gray-700">${esc(v.nombre)}</p>
            <p class="text-xs text-gray-500 truncate">${esc(v.texto)}</p>
          </div>
        </div>`;
      }).join("");
}

// ═══════════════════════════════════════════════════════════════
// ADMIN EMPLEADOS
// ═══════════════════════════════════════════════════════════════
function renderAdminEmpleados() {
  const app = document.getElementById("app");
  app.innerHTML = topbar("Empleados", true) + `
  <div class="fade-up px-4 pt-4 pb-24 space-y-4">
    <button onclick="abrirNuevoEmpleado()"
            class="w-full bg-as-orange text-white rounded-xl py-3 font-semibold text-sm btn flex items-center justify-center gap-2">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      Agregar empleado
    </button>
    <div id="emp-lista" class="space-y-2">
      ${empleados.map(e => `
        <div class="bg-white rounded-xl p-4 flex items-center gap-3 card-hover">
          <div class="w-9 h-9 rounded-full bg-as-navy flex items-center justify-content text-sm font-bold text-white flex-shrink-0"
               style="display:flex;align-items:center;justify-content:center">
            ${esc(e.nombre).charAt(0)}
          </div>
          <div class="flex-1 min-w-0">
            <p class="font-semibold text-sm text-gray-800">${esc(e.nombre)}</p>
            <p class="text-xs text-gray-400">${esc(e.puesto||"Sin puesto")}${e.nacimiento ? " · 🎂 " + formatFecha(e.nacimiento) : ""}</p>
          </div>
          <div class="flex flex-col gap-1 flex-shrink-0 items-end">
            <button onclick="abrirEditarEmpleado('${e.id}')"
                    class="text-xs text-blue-500 hover:text-blue-700 transition-colors">Editar</button>
            <button onclick="toggleEmpleado('${e.id}', ${e.activo !== false})"
                    class="text-xs ${e.activo !== false ? "text-red-400 hover:text-red-600" : "text-green-600 hover:text-green-800"} transition-colors">
              ${e.activo !== false ? "Dar de baja" : "Reactivar"}
            </button>
          </div>
        </div>`).join("") || `<p class="text-sm text-gray-400 text-center py-8">Sin empleados cargados</p>`}
    </div>
  </div>

  <div id="modal-emp" class="modal-bg hidden" onclick="if(event.target===this)this.classList.add('hidden')">
    <div class="modal-box">
      <h3 class="font-semibold text-gray-800 mb-4" id="modal-emp-titulo">Nuevo empleado</h3>
      <input type="hidden" id="emp-id" value="" />
      <div class="space-y-3">
        <div>
          <label>Nombre completo *</label>
          <input type="text" id="emp-nombre" placeholder="Ej: María González" />
        </div>
        <div>
          <label>Puesto</label>
          <input type="text" id="emp-puesto" placeholder="Ej: Cocinero, Cajero…" />
        </div>
        <div>
          <label>Fecha de nacimiento</label>
          <input type="date" id="emp-nacimiento" />
        </div>
        <div class="flex gap-2 pt-2">
          <button onclick="document.getElementById('modal-emp').classList.add('hidden')"
                  class="flex-1 border border-gray-200 rounded-xl py-2.5 text-sm text-gray-600 btn">Cancelar</button>
          <button onclick="guardarEmpleado()"
                  class="flex-1 bg-as-orange text-white rounded-xl py-2.5 text-sm font-semibold btn">Guardar</button>
        </div>
      </div>
    </div>
  </div>`;
}

window.abrirNuevoEmpleado = function() {
  document.getElementById("modal-emp-titulo").textContent = "Nuevo empleado";
  document.getElementById("emp-id").value = "";
  document.getElementById("emp-nombre").value = "";
  document.getElementById("emp-puesto").value = "";
  document.getElementById("emp-nacimiento").value = "";
  document.getElementById("modal-emp").classList.remove("hidden");
  setTimeout(() => document.getElementById("emp-nombre").focus(), 100);
};

window.abrirEditarEmpleado = function(id) {
  const e = empleados.find(x => x.id === id);
  if (!e) return;
  document.getElementById("modal-emp-titulo").textContent = "Editar empleado";
  document.getElementById("emp-id").value = id;
  document.getElementById("emp-nombre").value = e.nombre || "";
  document.getElementById("emp-puesto").value = e.puesto || "";
  document.getElementById("emp-nacimiento").value = e.nacimiento || "";
  document.getElementById("modal-emp").classList.remove("hidden");
  setTimeout(() => document.getElementById("emp-nombre").focus(), 100);
};

window.guardarEmpleado = async function() {
  const nombre     = document.getElementById("emp-nombre").value.trim();
  const puesto     = document.getElementById("emp-puesto").value.trim();
  const nacimiento = document.getElementById("emp-nacimiento").value;
  const empId      = document.getElementById("emp-id").value;
  if (!nombre) { toast("Ingresá el nombre"); return; }
  try {
    if (empId) {
      // Editar existente
      await updateDoc(doc(db,"empleados",empId), {
        nombre, puesto: puesto || "", nacimiento: nacimiento || "",
      });
      toast("Empleado actualizado ✓");
    } else {
      // Nuevo
      await addDoc(collection(db,"empleados"), {
        nombre, puesto: puesto || "", nacimiento: nacimiento || "",
        activo: true, creadoEn: serverTimestamp()
      });
      toast("Empleado agregado ✓");
    }
    await loadEmpleados();
    document.getElementById("modal-emp").classList.add("hidden");
    renderAdminEmpleados();
  } catch(e) { toast("Error al guardar"); }
};

window.toggleEmpleado = async function(id, esActivo) {
  const msg = esActivo ? "¿Dar de baja a este empleado?" : "¿Reactivar este empleado?";
  if (!confirm(msg)) return;
  await updateDoc(doc(db,"empleados",id), { activo: !esActivo });
  await loadEmpleados();
  toast(esActivo ? "Empleado dado de baja" : "Empleado reactivado");
  renderAdminEmpleados();
};

// ═══════════════════════════════════════════════════════════════
// ADMIN EVALUAR
// ═══════════════════════════════════════════════════════════════
async function renderAdminEvaluar() {
  const mes = mesActual();
  const app = document.getElementById("app");

  // Cargar evaluaciones del mes
  let evalMap = {};
  try {
    const snap = await getDocs(query(collection(db,"evaluaciones"), where("mes","==",mes)));
    snap.forEach(d => {
      const v = d.data();
      if (!evalMap[v.empleadoId]) evalMap[v.empleadoId] = {};
      evalMap[v.empleadoId][v.categoria] = v.puntos;
    });
  } catch(e) {}

  const categorias = [
    { id:"limpieza",    label:"Limpieza y orden",    max:25, icon:"✨" },
    { id:"calidad",     label:"Calidad de comida",   max:25, icon:"🍔" },
    { id:"resenas",     label:"Reseñas positivas",   max:20, icon:"⭐", grupal: true },
    { id:"uniforme",    label:"Uniforme completo",   max:15, icon:"👕" },
    { id:"puntualidad", label:"Puntualidad",         max:15, icon:"⏰" },
  ];

  app.innerHTML = topbar("Evaluar empleados", true) + `
  <div class="fade-up px-4 pt-4 pb-24 space-y-4">
    <div class="bg-amber-50 border border-amber-200 rounded-xl p-3 text-xs text-amber-700">
      Registrás el puntaje acumulado del mes. Cada categoría suma hasta su máximo. Los puntajes se pueden editar.
    </div>
    <p class="text-xs text-gray-400 font-medium uppercase tracking-wider">${mesLabel(mes)}</p>

    ${empleados.map(emp => {
      const ev = evalMap[emp.id] || {};
      const total = Math.min(Object.values(ev).reduce((a,b) => a+b, 0), 100);
      return `
      <div class="bg-white rounded-xl overflow-hidden card-hover">
        <div class="flex items-center gap-3 px-4 py-3 border-b border-gray-100 cursor-pointer"
             onclick="toggleEmpPanel('${emp.id}')">
          <div class="w-8 h-8 rounded-full bg-as-navy flex items-center justify-content text-sm font-bold text-white flex-shrink-0"
               style="display:flex;align-items:center;justify-content:center">
            ${esc(emp.nombre).charAt(0)}
          </div>
          <div class="flex-1">
            <p class="font-semibold text-sm text-gray-800">${esc(emp.nombre)}</p>
            <div class="bar-wrap mt-1"><div class="bar-fill" style="width:${total}%;background:${nivelColor(total)}"></div></div>
          </div>
          <div class="text-right flex-shrink-0">
            <p class="font-bold text-gray-800">${total}</p>
            <p class="text-xs text-gray-400">/ 100</p>
          </div>
        </div>
        <div id="panel-${emp.id}" class="hidden px-4 pb-4 pt-2 space-y-3">
          ${categorias.map(cat => `
            <div class="flex items-center gap-3">
              <span class="text-base w-6 flex-shrink-0">${cat.icon}</span>
              <div class="flex-1">
                <p class="text-xs font-medium text-gray-700">${cat.label} <span class="text-gray-400">(máx ${cat.max})</span>
                  ${cat.grupal ? `<span class="text-xs bg-blue-100 text-blue-700 px-1.5 py-0.5 rounded ml-1">Grupal</span>` : ""}
                </p>
              </div>
              <input type="number" min="0" max="${cat.max}" step="1"
                     value="${ev[cat.id] ?? ""}"
                     placeholder="0"
                     class="w-16 text-center text-sm font-semibold"
                     onchange="guardarEval('${emp.id}','${cat.id}',${cat.max},this.value)"
                     id="eval-${emp.id}-${cat.id}" />
            </div>`).join("")}
        </div>
      </div>`;
    }).join("") || `<p class="text-sm text-gray-400 text-center py-8">Sin empleados. Primero agregá uno en la sección Empleados.</p>`}
  </div>`;
}

window.toggleEmpPanel = function(id) {
  const el = document.getElementById(`panel-${id}`);
  el.classList.toggle("hidden");
};

window.guardarEval = async function(empId, catId, max, val) {
  const pts = Math.max(0, Math.min(parseInt(val)||0, max));
  const mes = mesActual();
  const docId = `${mes}_${empId}_${catId}`;
  try {
    await setDoc(doc(db,"evaluaciones",docId), {
      mes, empleadoId: empId, categoria: catId, puntos: pts,
      updatedAt: serverTimestamp(),
    });
    toast(`Guardado: ${pts} pts ✓`);
  } catch(e) {
    toast("Error al guardar");
  }
};

// ═══════════════════════════════════════════════════════════════
// ADMIN LIMPIEZA
// ═══════════════════════════════════════════════════════════════
async function renderAdminLimpieza() {
  const app = document.getElementById("app");
  const today = new Date().toISOString().split("T")[0];

  const sectores = {
    salon:  ["Vereda","Vidriera","Salón","Cafetería","Cervezas","Heladeras","Vasos y entrega","Oficina","Baños"],
    cocina: ["Horno","Plancha","Campana","Freidoras","Freezers","Bacha","Depósito","Panadería","Heladeras"],
  };

  app.innerHTML = topbar("Inspección de limpieza", true) + `
  <div class="fade-up px-4 pt-4 pb-24 space-y-4">

    <div class="flex gap-2">
      <button onclick="setAreaTab('salon')" id="tab-salon"
              class="flex-1 py-2 rounded-xl text-sm font-semibold bg-as-navy text-white btn">
        🪑 Salón
      </button>
      <button onclick="setAreaTab('cocina')" id="tab-cocina"
              class="flex-1 py-2 rounded-xl text-sm font-semibold bg-gray-100 text-gray-600 btn">
        🍳 Cocina
      </button>
    </div>

    <div id="limpieza-form" class="space-y-2"></div>

    <div class="bg-white rounded-xl p-4">
      <div class="flex items-center justify-between mb-2">
        <p class="text-sm font-semibold text-gray-700">Puntaje</p>
        <p class="text-xl font-bold text-as-navy" id="lim-score">—</p>
      </div>
      <div class="bar-wrap"><div id="lim-bar" class="bar-fill" style="width:0%;background:#E8650A"></div></div>
    </div>

    <div>
      <label>Notas / observaciones</label>
      <textarea id="lim-notas" rows="3" placeholder="Ej: El baño del fondo estaba sin papel…"></textarea>
    </div>

    <button onclick="guardarInspeccion()" class="w-full bg-as-orange text-white rounded-xl py-3 font-semibold text-sm btn">
      Guardar inspección
    </button>

    <h3 class="font-semibold text-sm text-gray-700 pt-2">Últimas inspecciones</h3>
    <div id="lim-historial" class="space-y-2">
      <div class="h-14 bg-white rounded-xl animate-pulse"></div>
    </div>
  </div>`;

  window.__limArea = "salon";
  window.__limSectores = sectores;
  window.__limChecks = {};
  setAreaTab("salon");
  loadLimHistorial();
}

window.setAreaTab = function(area) {
  window.__limArea = area;
  window.__limChecks[area] = window.__limChecks[area] || {};

  const sects = window.__limSectores[area];
  document.getElementById("tab-salon").className =
    `flex-1 py-2 rounded-xl text-sm font-semibold btn ${area==="salon" ? "bg-as-navy text-white" : "bg-gray-100 text-gray-600"}`;
  document.getElementById("tab-cocina").className =
    `flex-1 py-2 rounded-xl text-sm font-semibold btn ${area==="cocina" ? "bg-as-navy text-white" : "bg-gray-100 text-gray-600"}`;

  document.getElementById("limpieza-form").innerHTML = sects.map(s => `
    <div class="bg-white rounded-xl p-3 flex items-center gap-3">
      <button onclick="toggleSector('${s}')"
              class="w-7 h-7 rounded-lg border-2 flex items-center justify-content flex-shrink-0 btn transition-colors"
              id="sec-${s.replace(/\s/g,'')}"
              style="display:flex;align-items:center;justify-content:center;border-color:#D1D5DB">
        <svg id="sec-ico-${s.replace(/\s/g,'')}" width="16" height="16" fill="none" stroke="transparent" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>
      </button>
      <p class="text-sm text-gray-700 flex-1">${esc(s)}</p>
    </div>`).join("");

  updateLimScore();
};

window.toggleSector = function(s) {
  const area = window.__limArea;
  if (!window.__limChecks[area]) window.__limChecks[area] = {};
  window.__limChecks[area][s] = !window.__limChecks[area][s];
  const key = s.replace(/\s/g,"");
  const btn = document.getElementById(`sec-${key}`);
  const ico = document.getElementById(`sec-ico-${key}`);
  const ok  = window.__limChecks[area][s];
  btn.style.borderColor  = ok ? "#E8650A" : "#D1D5DB";
  btn.style.background   = ok ? "#E8650A" : "white";
  ico.style.stroke       = ok ? "white"   : "transparent";
  updateLimScore();
};

function updateLimScore() {
  const area   = window.__limArea;
  const checks = window.__limChecks[area] || {};
  const sects  = window.__limSectores[area];
  const ok     = Object.values(checks).filter(Boolean).length;
  const pct    = sects.length ? Math.round((ok / sects.length) * 100) : 0;
  document.getElementById("lim-score").textContent = `${pct}%`;
  const bar = document.getElementById("lim-bar");
  bar.style.width = `${pct}%`;
  bar.style.background = pct >= 80 ? "#10B981" : pct >= 60 ? "#F59E0B" : "#EF4444";
}

window.guardarInspeccion = async function() {
  const area   = window.__limArea;
  const checks = window.__limChecks[area] || {};
  const sects  = window.__limSectores[area];
  const ok     = Object.values(checks).filter(Boolean).length;
  const pct    = sects.length ? Math.round((ok / sects.length) * 100) : 0;
  const notas  = document.getElementById("lim-notas").value.trim();
  const today  = new Date().toISOString().split("T")[0];

  try {
    await addDoc(collection(db,"inspecciones"), {
      area, fecha: today, mes: today.slice(0,7),
      puntaje: pct, sectores: checks, notas,
      createdAt: serverTimestamp(),
    });
    toast("Inspección guardada ✓");
    window.__limChecks[area] = {};
    setAreaTab(area);
    document.getElementById("lim-notas").value = "";
    loadLimHistorial();
  } catch(e) {
    toast("Error al guardar");
  }
};

async function loadLimHistorial() {
  try {
    const snap = await getDocs(
      query(collection(db,"inspecciones"), orderBy("createdAt","desc"), limit(6))
    );
    const cont = document.getElementById("lim-historial");
    if (!cont) return;
    cont.innerHTML = snap.empty
      ? `<p class="text-sm text-gray-400 text-center py-4">Sin inspecciones registradas</p>`
      : snap.docs.map(d => {
          const v = d.data();
          const color = v.puntaje >= 80 ? "text-green-600" : v.puntaje >= 60 ? "text-amber-500" : "text-red-500";
          return `
          <div class="bg-white rounded-xl p-3 flex items-center gap-3">
            <span class="text-lg">${v.area==="salon"?"🪑":"🍳"}</span>
            <div class="flex-1">
              <p class="text-sm font-medium text-gray-700">${v.area==="salon"?"Salón":"Cocina"} · ${v.fecha||""}</p>
              ${v.notas ? `<p class="text-xs text-gray-400 truncate">${esc(v.notas)}</p>` : ""}
            </div>
            <p class="font-bold ${color}">${v.puntaje}%</p>
          </div>`;
        }).join("");
  } catch(e) {}
}

// ═══════════════════════════════════════════════════════════════
// ADMIN RESEÑAS
// ═══════════════════════════════════════════════════════════════
async function renderAdminResenas() {
  const mes = mesActual();
  const app = document.getElementById("app");

  // Cargar reseñas actuales
  let resMap = {};
  try {
    const snap = await getDocs(query(collection(db,"resenas"), where("mes","==",mes)));
    snap.forEach(d => { const v = d.data(); resMap[v.fuente] = v; });
  } catch(e) {}

  const fuentes = [
    { k:"google",      label:"Google",                icon:"🔍" },
    { k:"pedidosya_h", label:"PedidosYa Hamburguesería", icon:"🍔" },
    { k:"pedidosya_c", label:"PedidosYa Cafetería",   icon:"☕" },
    { k:"salon",       label:"Salón",                 icon:"🪑" },
  ];

  app.innerHTML = topbar("Cargar reseñas", true) + `
  <div class="fade-up px-4 pt-4 pb-24 space-y-4">
    <p class="text-xs text-gray-400 font-medium uppercase tracking-wider">${mesLabel(mes)}</p>

    ${fuentes.map(f => {
      const v = resMap[f.k];
      return `
      <div class="bg-white rounded-xl p-4">
        <div class="flex items-center gap-3 mb-3">
          <span class="text-2xl">${f.icon}</span>
          <p class="font-semibold text-sm text-gray-800">${f.label}</p>
          ${v ? `<span class="ml-auto text-xs text-gray-400">Actual: ${parseFloat(v.puntaje).toFixed(1)}</span>` : ""}
        </div>
        <div class="flex items-center gap-3 mb-3">
          <input type="number" min="1" max="5" step="0.1"
                 value="${v ? parseFloat(v.puntaje).toFixed(1) : ""}"
                 placeholder="Ej: 4.6"
                 id="res-input-${f.k}"
                 class="w-28 text-center text-lg font-bold"
                 onchange="setResena('${f.k}','${mes}',parseFloat(this.value))"
                 oninput="actualizarStars('${f.k}',this.value)" />
          <div>
            <div class="text-xl" id="res-stars-${f.k}">${starsHtml(v ? v.puntaje : 0)}</div>
            <p class="text-xs text-gray-400">entre 1.0 y 5.0</p>
          </div>
        </div>
      </div>`;
    }).join("")}

    <div class="bg-gray-50 rounded-xl p-4 text-xs text-gray-500">
      Los puntajes se guardan automáticamente al hacer clic. Se pueden actualizar cuantas veces quieras durante el mes.
    </div>
  </div>`;
}

window.actualizarStars = function(fuente, val) {
  const stars = document.getElementById(`res-stars-${fuente}`);
  if (stars) stars.innerHTML = starsHtml(parseFloat(val) || 0);
};

window.setResena = async function(fuente, mes, puntaje) {
  if (isNaN(puntaje) || puntaje < 1 || puntaje > 5) {
    toast("El puntaje debe estar entre 1.0 y 5.0");
    return;
  }
  puntaje = Math.round(puntaje * 10) / 10;
  const docId = `${mes}_${fuente}`;
  try {
    await setDoc(doc(db,"resenas",docId), {
      fuente, mes, puntaje, updatedAt: serverTimestamp()
    });
    toast(`${puntaje.toFixed(1)} ★ guardado ✓`);
    actualizarStars(fuente, puntaje);
  } catch(e) {
    toast("Error al guardar");
  }
};
